###############################################################################
# Gold Pipeline Configuration — Local Chrome
#
# Use this when running outside Docker with Chrome + your browser profile.
# Best for publishers with Cloudflare protection (Wiley, etc.) — your
# existing browser cookies and fingerprint bypass most bot detection.
#
# Requirements:
#   - Google Chrome or Chromium installed
#   - chromedriver (auto-managed by Selenium 4.19+)
#   - StirlingPDF running separately: docker run -p 8080:8080 stirlingtools/stirling-pdf:latest
#   - Close Chrome before running (or the profile will be copied automatically)
#   - Chrome PDF setting: Settings → Privacy and security → Site settings →
#     Additional content settings → PDF documents → select "Download PDFs"
#
# Usage:
#   cp config.chrome.yaml config.yaml
#   python run.py --start 0 --end 100
###############################################################################

# ── Input ────────────────────────────────────────────────────────────────
input:
  csv_path: "./data/input/articles.csv"
  url_column: "ArticleURL"

# ── Directories ──────────────────────────────────────────────────────────
paths:
  html_dir: "./data/downloads/html"
  download_dir: "./data/downloads/files"
  text_dir: "./data/output/text"
  xyz_dir: "./data/output/xyz"
  figures_dir: "./data/output/figures"
  biblatex_dir: "./data/output/biblatex"
  comp_details_dir: "./data/output/comp_details"
  db_path: "./data/db/pipeline.db"

# ── StirlingPDF ──────────────────────────────────────────────────────────
stirling:
  base_url: "${STIRLING_URL:-http://localhost:8080}"
  timeout: 120
  retries: 3

# ── Scraper settings ────────────────────────────────────────────────────
scraper:
  browser: chrome                    # use your real Chrome browser
  browser_profile: auto              # auto-detect your Chrome profile
  chrome_profile_directory: Default  # "Default", "Profile 1", etc.
  headless: false                    # visible browser — needed for CAPTCHA fallback
  interactive: true                  # prompt to solve CAPTCHAs manually if needed
  page_load_timeout: 20
  download_timeout: 90
  delay_between_articles: 20
  delay_after_downloads: 30
  delay_on_empty_links: 60
  max_retries: 3
  cookie_strategies:
    - ""

# ── File types ───────────────────────────────────────────────────────────
file_types:
  auto_download:
    - .pdf
    - .xyz
    - .cif
    - .txt
    - .xlsx
    - .mol
    - .mol2
    - .data
    - .docx
    - .pdb
    - .zip
    - .csv
  text_in_browser:
    - .txt
    - .csv
    - .xml
    - .html
    - .mol
    - .mol2

# ── PDF Processing ──────────────────────────────────────────────────────
pdf_processing:
  footer_keywords:
    - "Copyright"
    - "Royal"
    - "Society"
    - "Wiley"
    - "American"
    - "Supplemental"
    - "Information"
    - "Communications"
    - "Supplementary"
  margin_lines: 5

# ── Computational chemistry detection ───────────────────────────────────
cc_detection:
  keywords:
    - "computational"
    - "theoretical"
    - "DFT"
    - "Gaussian"
    - "ORCA"
    - "Jaguar"
    - "basis set"
    - "functional"
    - "CCSD"
    - "coupled cluster"
    - "B3LYP"
    - "M06"
    - "PBE"
    - "6-31G"
    - "CPCM"
    - "dispersion"
    - "transition state"
    - "frequency"
    - "imaginary"
    - "coordinates"
    - "optimization"
    - "solvation"
    - "polarization"

# ── XYZ / transition state detection ────────────────────────────────────
ts_detection:
  keywords: ["TS", "transition", "state", "imag"]
  extensions: [".xyz", ".mol", ".mol2"]

# ── LLM extraction ──────────────────────────────────────────────────────
llm:
  provider: "${LLM_PROVIDER:-openai}"
  model: "${LLM_MODEL:-gpt-4o}"
  temperature: 0.2
  max_chars: 200000
