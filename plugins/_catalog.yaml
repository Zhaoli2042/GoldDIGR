          lines: 70-190
        - name: carry_forward_completed_outputs
          description: Include completed .out/.inp/matrix/log files in round-2 zip so final results are self-contained.
          transferable: true
          lines: 240-330
        - name: skip_list_contract
          description: Write skip.txt listing completed molecule names; worker respects it to avoid recomputation.
          transferable: true
          lines: 310-360
        - name: scan_backups_for_inner_results
          description: Extract backup archives and inspect contained *_results.tar.gz files.
          transferable: true
          lines: 190-240
      run_orca_wbo.sh:
        role: driver
        description: 'Worker-side computation: parse charge/multiplicity from zip filename; unzip inputs; optionally read
