    patterns:
      input_adaptation: Ligand candidates are represented as individual .xyz files; step0 converts each xyz into a TAFFI-style
        parameter database (.db) by running (optional) geometry optimization, ORCA ESP singlepoint, charge fitting (extract_charges.py),
        then make_db.py to merge parameters/charges. step1 expects paired xyz+db with identical basename.
      job_submission: 'High-throughput fan-out: step1 submits one Slurm job per ligand per replicate run directory (run1..runN)
        using sbatch; step0 submits per-ligand ORCA/xTB jobs and blocks using a polling monitor.'
      resource_management: Resources are configured via config.txt (nodes/ppn/walltime/queue/LAMMPS_PATH) for MD; step0 uses
        a user-specified -cpu for ORCA. No dynamic escalation; failures are detected by checking output/success files and
        skipping downstream steps.
      monitoring: Polling-based monitoring via squeue (monitor_jobs.py) and output-file completion checks (e.g., presence
        of 0.success, ORCA completion checks).
      result_collection: step2 writes stability.out per ligand directory; step3 aggregates across directories, applies thresholds,
        copies ligand images into Passed/Failed/Strained, and writes a consolidated stabilities.out; optional insertion into
        SQLite DB.
      charge_mult: Charge/multiplicity are handled explicitly in ORCA input parsing and antechamber invocation; defaults in
        make_db.py are q=0, multiplicity=1 unless overridden; perovskite_builder uses explicit ionic charges via -q 'cation
        metal anion'.
    known_issues:
    - scheduler: slurm
      issue: step1.build_bulk_sims.py hard-requires a config.txt (or -config override) with JOB_MD_PPN, JOB_MD_NODES, JOB_MD_WALLTIME,
        JOB_MD_QUEUE, LAMMPS_PATH; no template provided.
      fix: Provide a site-specific config.txt in the working directory or pass -config with a valid file; ensure LAMMPS_PATH
        points to an MPI-capable lmp executable.
      pattern: config_file_contracts_must_ship_templates
    - scheduler: slurm
      issue: step0.prepare_ligand_batch.py depends on helper functions and Logger not present/imported in the provided bundle
        (e.g., write_orcash, submit_job_nomonitor, check_orca_complete).
      fix: Vendor the missing util modules or refactor step0 to import MD/lib/functions.Logger and include the missing submission/check
        writer utilities; validate imports before job submission.
      pattern: orchestrator_scripts_should_bundle_all_helpers
    - scheduler: slurm
      issue: make_db.py and step0 default to hard-coded /depot/... paths for ORCA/xTB/AmberTools; will fail on other clusters.
      fix: Override CLI arguments (-orca_exe, -xtb_exe, -amber_exe) and make_db.py -amber path; consider environment modules
        or PATH-based discovery.
      pattern: avoid_hardcoded_hpc_paths
    - scheduler: slurm
      issue: Required master parameter file gaff2_perov.dat is referenced by step0-generated makedb.sh but not included.
      fix: Ship gaff2_perov.dat with the plugin or require users to provide it and pass its path into the generated makedb.sh/make_db.py
        call.
      pattern: external_forcefield_assets_must_be_packaged
    - scheduler: slurm
      issue: step3.collect_stabilities.py defaults to using MD/data/ML_perovskites.db, which is not included; script aborts
        unless -name None is used.
      fix: Run with -name None to skip DB steps, or provide the expected SQLite DB file/schema in MD/data/.
      pattern: optional_db_dependencies_should_default_off_or_ship_db
    - scheduler: slurm
      issue: MD/generate_molecules.py content appears truncated; if true, it will raise a syntax error and block ligand generation.
      fix: Ensure the full script is present (complete smi2xyz and optimization routines) or regenerate from source control.
      pattern: packaging_must_include_complete_sources
    - scheduler: slurm
      issue: Documentation/comments reference missing scripts (e.g., ML.parse_form_bulk.sh) and a prettier name evaluate_octahedra.py;
        can confuse operators.
      fix: Treat references as comments only; use MD/step2.evaluate_octahedra.py for stability evaluation.
      pattern: keep_docs_in_sync_with_entrypoints
    glue_strategy: Python entry-point scripts orchestrate per-ligand directory fan-out, generate input decks and submission
      scripts, submit Slurm jobs, poll for completion, then parse outputs into aggregated stability metrics and optional DB
      records.
    reusable_for:
    - Any high-throughput MD screening workflow that needs per-candidate parametrization, replicate MD runs, trajectory-derived
      stability metrics, and aggregation into pass/fail labels.
    - Workflows that bridge quantum chemistry ESP calculations to force-field charge fitting and database generation.
    - HPC Slurm-based pipelines that generate job scripts programmatically and use polling barriers for dependency management.
    - Small-dataset ML classification pipelines using SMOTE and Leave-One-Out CV with standardized plotting/reporting.
    _status: complete
  Auto3D-GPU-Slurm:
    input_type: smiles_prefix_list
    input_format: 'Plaintext file with one molecule per line: ''SMILES PREFIX'' (whitespace-separated). Prefix is used as
      stable molecule identifier and output filename stem.'
    output_type: Per-molecule 3D structure files (.sdf) produced by Auto3D (AIMNET, GPU-enabled), plus per-batch benchmark
      JSONs and summary lists of finished/failed/missing SMILES for retry.
    computation:
      tool: Auto3D (Python package) via purdue_standby_auto3d_auto_batch.py
      type: script
      container: none (conda environment expected; no container references detected)
      key_features:
      - Batches a large SMILES list into JSON batch dictionaries for distributed execution
      - Generates SLURM submission scripts per batch targeting GPU partitions (A100/A30/A10/H100) with standby QoS
      - Runs Auto3D on GPU with AIMNET optimizing engine; writes per-prefix SDF outputs and .smi provenance files
      - Collects per-batch benchmark metadata (intended) and compiles finished/failed/missing SMILES lists for iterative retries
      - Post-run utility to consolidate scattered SDF outputs into a single directory and build a master SMILES/PREFIX map
    scheduler_tested:
    - slurm
    infrastructure:
      filesystem: shared
      filesystem_details: Assumes a shared filesystem visible to submit and compute nodes (uses relative paths under the working
        directory and /scratch conda env path; no HTCondor transfer semantics).
      container_delivery: none
      container_path: ''
      mpi: none
      mpi_scheduler_integration: Auto3D is invoked with mpi_np=10 but no explicit mpirun/srun; relies on Auto3D internal parallelism
        and allocated CPUs (--cpus-per-gpu=10).
      gpu_required: true
      internet_required: false
      special_requirements:
      - 'SLURM cluster with GPU partitions named like: a100-80gb,a100-40gb,a30,a10,h100 and QoS ''standby'''
      - Module system providing 'module load conda' and ability to 'conda activate <env>' inside batch jobs
      - Conda environment must include Auto3D and GPU stack compatible with node drivers (README references auto3d_conda_package_260113.yaml,
        not included)
      - Sufficient memory per job (script requests 100G) and local scratch space for temporary Auto3D working directories
    files:
      README.md:
        role: config
        description: 'Operational runbook for Purdue Standby: create conda env, run auto-batching driver, triage failures/missing,
          collect SDFs, and transfer results to a target dataset directory.'
        concepts:
        - name: iterative_retry_loop
          description: Run batches, then generate failed/missing SMILES lists and re-run until coverage is complete.
          transferable: true
          lines: 1-8
        - name: cluster_specific_run_instructions
          description: Assumes Purdue Standby SLURM environment, conda module, and specific destination paths for final data
            transfer.
          transferable: false
          lines: 1-8
      purdue_standby_auto3d_auto_batch.py:
        role: driver
        description: 'Primary workflow driver: reads SMILES/PREFIX list, creates batch JSON dicts, writes SLURM submission
          scripts, submits jobs, and runs Auto3D per batch (intended). Produces per-prefix SDF and .smi outputs and per-batch
          benchmark JSONs (intended).'
        concepts:
        - name: project_directory_layout
          description: Defines fixed output subdirectories for geometric outputs, batch dicts, submissions, and benchmarks
            under ./geo_data_out_path/.
          transferable: true
          lines: 20-33
        - name: smiles_prefix_parsing
          description: Parses each input line as SMILES plus optional PREFIX; PREFIX becomes stable identifier and output
            filename stem.
          transferable: true
          lines: 52-92
        - name: done_set_filtering
          description: Supports skipping already-processed SMILES via a provided 'smiles_done_set' when generating batch dicts.
          transferable: true
          lines: 55-96
        - name: batch_dict_contract
          description: Batch JSON maps SMILES -> 'out_dir:::prefix' using BATCH_DICT_SEPARATOR to pack multiple fields into
            one value.
          transferable: true
          lines: 34-36, 73-90
        - name: slurm_submission_script_generation
          description: Writes per-batch SBATCH scripts requesting 1 GPU, 10 CPUs, 100G RAM, 4h walltime, standby QoS, and
            GPU partitions list; activates conda env then calls this script with 'run-batch'.
          transferable: true
          lines: 106-151
        - name: bulk_job_submission
          description: Submits many batch scripts via sbatch up to a max cap (default 4900) and records submitted filenames.
          transferable: true
          lines: 154-166
        - name: temporary_workdir_per_subbatch
          description: Creates a unique temp directory under the first molecule's output directory to run Auto3D once for
            a subbatch, then distributes per-prefix outputs.
          transferable: true
          lines: 214-323
        - name: sdf_record_splitting_by_title
          description: Splits a multi-record SDF into per-molecule records keyed by the first line (title), expected to match
            PREFIX labels.
          transferable: true
          lines: 184-212
        - name: per_prefix_output_fanout
          description: Writes {PREFIX}.sdf and {PREFIX}.smi for each molecule; copies Auto3D.log and optional encoded SDF
            for provenance.
          transferable: true
          lines: 268-323
        - name: single_smiles_fallback_mode
          description: Runs Auto3D per SMILES and writes results into an out_path/results directory using PREFIX-based filenames.
          transferable: true
          lines: 326-402
        - name: benchmark_metadata_capture_intent
          description: Captures SLURM env metadata (partition, job id, etc.) and intends to write per-batch benchmark JSON
            for downstream status aggregation; implementation is truncated.
          transferable: true
          lines: 405-460 (truncated)
        - name: auto3d_dependency_guard
          description: If Auto3D import fails, sets _AUTO3D_AVAILABLE=False and skips computations with warnings.
          transferable: true
          lines: 10-18, 214-233, 326-334
      get_auto3d_calc_status.py:
        role: operational
        description: Aggregates per-batch benchmark JSONs into human-readable summaries (txt/tsv) and emits finished (SMILES-only),
          failed (SMILES PREFIX), and missing (SMILES PREFIX) lists for retries.
        concepts:
        - name: benchmark_json_schema_assumption
          description: 'Expects JSON fields: batch_id, hostname, slurm.partition, slurm.job_id, elapsed_hms, counts{done,total,failed},
            batch_json_path, completed_smiles, per_smiles_status.'
          transferable: true
          lines: 70-156
        - name: smiles_prefix_map_rehydration
          description: Loads original SMILES list to map SMILES back to PREFIX for failed/missing outputs.
          transferable: true
          lines: 33-58, 90-99, 160-205
        - name: missing_set_computation
          description: Computes missing = original - finished - failed to drive iterative reruns.
          transferable: true
          lines: 186-205
        - name: elapsed_time_aggregation
          description: Parses elapsed_hms per batch, sums total time, and reports per-molecule average.
          transferable: true
          lines: 61-88, 206-226
        - name: hardcoded_paths_rounds
          description: Uses hardcoded BENCH_DIR and output filenames tied to a specific round (rd_4) and requires manual editing
            of ORIGINAL_SMILES_PATH.
          transferable: false
          lines: 6-20, 23-25
      collect_auto3d_structures.py:
        role: operational
        description: Walks an Auto3D output tree, copies all .sdf files into a single directory, and appends SMILES/PREFIX
          lines from accompanying .smi files into a consolidated mapping file.
        concepts:
        - name: recursive_result_collection
          description: Uses os.walk to find outputs across nested batch directories and consolidate them.
          transferable: true
          lines: 24-71
        - name: provenance_map_compilation
          description: Builds/updates all_smiles_prefix_map.txt by reading each {PREFIX}.smi (expected format 'SMILES PREFIX').
          transferable: true
          lines: 52-86
        - name: metadata_preserving_copy
          description: Uses shutil.copy2 to preserve timestamps/metadata when collecting SDFs.
          transferable: true
          lines: 43-51
    patterns:
      input_adaptation: Input is a SMILES/PREFIX list; driver deduplicates lines, parses SMILES and PREFIX, and encodes per-molecule
        output routing as JSON mapping SMILES -> 'out_dir:::prefix'.
      job_submission: Generates one SLURM sbatch script per batch JSON; optionally submits many jobs in bulk (up to a cap)
        from a submissions directory.
      resource_management: 'Static resource request per batch: 1 GPU, 10 CPU cores, 100G RAM, 4h walltime; Auto3D configured
        with mpi_np=10 and memory=64 (internal).'
      monitoring: Intended monitoring via per-batch benchmark JSONs and a status aggregation script producing finished/failed/missing
        lists; no active health checks or auto-resubmission.
      result_collection: Per-prefix outputs written as {PREFIX}.sdf and {PREFIX}.smi; optional Auto3D.log copied for provenance;
        separate collector script consolidates SDFs and builds a global SMILES/PREFIX map.
      charge_mult: Not applicable (no charge/multiplicity logic present).
    known_issues:
    - scheduler: slurm
      issue: 'Main driver script is truncated/incomplete: run_batch_auto3d() ends mid-loop; missing benchmark JSON writing,
        missing completion of batch logic, and missing CLI/argparse subcommands required by README (''--batch-size'', ''--auto-batch-size'')
        and by generated sbatch scripts (''run-batch ...''). Workflow cannot run end-to-end as provided.'
      fix: 'Restore full driver implementation: complete run_batch_auto3d loop, implement benchmark JSON emission matching
        get_auto3d_calc_status.py schema, and add argparse CLI with top-level batching mode and ''run-batch'' subcommand.'
      pattern: Keep downstream status/triage tools schema-locked to the producer; add contract tests that generate a sample
        benchmark JSON and validate parsing.
    - scheduler: slurm
      issue: Conda environment spec file auto3d_conda_package_260113.yaml referenced in README is missing; without it Auto3D
        import may fail and computations will be skipped (_AUTO3D_AVAILABLE=False).
      fix: Include the conda env YAML in the plugin or document exact pip/conda install commands and pinned versions; add
        a startup check that errors loudly if Auto3D is unavailable.
      pattern: Bundle environment manifests with workflow plugins; fail-fast on missing critical dependencies.
    - scheduler: slurm
      issue: 'Path mismatch breaks retry loop: get_auto3d_calc_status.py BENCH_DIR points to geo_data_out_path_rd_4/... while
        driver uses ./geo_data_out_path/.... Status script will report no benchmark JSONs even if jobs ran.'
      fix: Parameterize BENCH_DIR and ORIGINAL_SMILES_PATH via CLI args; default to the same base output directory used by
        the driver.
      pattern: Avoid hardcoded round-specific paths; use a single configurable run root shared by all utilities.
    - scheduler: slurm
      issue: Status script assumes a benchmark JSON schema that the driver (as provided) does not actually produce due to
        truncation; even with a restored driver, schema drift will cause incorrect finished/failed/missing outputs.
      fix: Define and version the benchmark JSON schema; emit required fields (counts, completed_smiles, per_smiles_status,
        elapsed_hms, slurm metadata, batch_json_path).
      pattern: Schema versioning + validation for inter-script data exchange.
    - scheduler: slurm
      issue: Manual code edits required for ORIGINAL_SMILES_PATH and output naming in get_auto3d_calc_status.py; brittle across
        multiple rounds/input files.
      fix: Add argparse options for input smiles file, bench dir, and output prefix; write outputs into a run-specific directory.
      pattern: All operational scripts should be CLI-driven, not edited per run.
    glue_strategy: 'File-based glue: batch JSON dicts and benchmark JSONs connect submission/execution to post-run status
      aggregation; per-molecule .smi files provide provenance for later collection.'
    reusable_for:
    - GPU-accelerated per-molecule structure generation workflows that need batching, SLURM submission generation, and iterative
      retry based on finished/failed/missing sets
    - Any pipeline that fans out multi-record SDF outputs into per-identifier files using SDF title fields as keys
    - Large-scale dataset generation where provenance mapping (input ID -> output file) must be preserved and later consolidated
    _status: complete
