      monitor_health.sh:
        role: operational
        description: 'Auto-heals held HTCondor jobs: releases transfer-related holds, escalates memory/CPU on resource holds
          using defined levels and tracking file, upgrades disk on disk holds, logs unknown holds, and stops when no jobs
          remain.'
        concepts:
        - name: resource_escalation_ladder
          description: Defines RESOURCE_LEVELS as memoryMB:cpus; bumps level on memory/cpu holds; tracks per job in resource_tracking.dat.
          transferable: true
          lines: approx 20-210
        - name: hold_reason_classification
          description: Classifies holds by regex on HoldReason (transfer/OSDF/sif vs memory/cpu vs disk vs unknown).
          transferable: true
          lines: approx 120-310
        - name: condor_qedit_autorepair
          description: Uses condor_qedit to change RequestMemory/RequestCpus/RequestDisk then condor_release to retry.
          transferable: true
          lines: approx 170-320
        - name: tracking_file_garbage_collection
          description: Periodically prunes resource_tracking.dat to only current jobs.
          transferable: true
          lines: approx 330-390
      backup_results.sh:
        role: operational
        description: 'Background backup monitor: every 4 hours, finds result tarballs older than 4 hours and quiet for 10
          minutes, waits for a minimum count, creates verified tar.gz archives in long-term shared storage, deletes originals
          only after verification, and maintains manifests to resume incomplete backups.'
        concepts:
        - name: age_and_quiet_time_eligibility
          description: Selects files by mtime thresholds to avoid racing with in-progress writes.
          transferable: true
          lines: approx 70-140
        - name: verified_archival_with_manifest
          description: Writes manifest, creates .tmp archive, verifies with tar -tzf, atomically renames, then deletes originals.
          transferable: true
          lines: approx 140-260
        - name: resume_incomplete_backups
          description: Detects IN_PROGRESS/FAILED manifests and attempts to complete or retry safely.
          transferable: true
          lines: approx 260-330
        - name: destination_disk_alerting
          description: Checks df usage and alerts if destination exceeds threshold.
          transferable: true
          lines: approx 95-125
      prepare_round2.sh:
        role: operational
        description: Builds round-2 resubmission inputs for partial (timed-out) jobs by scanning results tarballs (local and
          backups), extracting status.json, carrying forward completed outputs, generating skip.txt, and creating new zips
          plus file_list_round2.txt.
        concepts:
        - name: partial_detection_via_status_json
          description: Extracts status.json from results tarballs and selects those with status=partial.
          transferable: true
          lines: approx 70-190
        - name: carry_forward_completed_outputs
          description: Copies completed molecule outputs from round-1 results into round-2 zip to keep final results self-contained.
          transferable: true
          lines: approx 250-330
        - name: skip_txt_generation
          description: Creates skip.txt listing completed molecules so run_orca_wbo.sh skips them in round-2.
          transferable: true
          lines: approx 330-360
        - name: round2_file_list_generation
          description: Creates file_list_round2.txt in the same two-column format used by batch_job.submit.
          transferable: true
          lines: approx 360-410
      status.sh:
        role: operational
        description: 'Human-facing status dashboard: summarizes condor_q totals, pending/submitted chunk counts, held job
          reasons, maxed-out jobs log, local results count, backup archive count/size, tmux monitor sessions, and resource
          escalation tracking.'
        concepts:
        - name: workflow_observability_summary
          description: Aggregates scheduler, filesystem, and monitor state into a quick CLI report.
          transferable: true
          lines: approx 1-170
      apply_memory_fix.sh:
        role: operational
        description: Idempotent patch script intended to reduce memory usage and adjust health escalation levels; edits run_orca_wbo.sh
          %maxcore, batch_job.submit request_memory, monitor_health.sh RESOURCE_LEVELS, qedits idle jobs, and restarts health
          monitor.
        concepts:
        - name: bulk_config_patch_with_sed
          description: Applies in-place edits across multiple workflow files to change resource defaults.
          transferable: true
          lines: approx 1-140
        - name: in_queue_resource_rewrite
          description: Uses condor_qedit with constraints to update RequestMemory for all idle jobs.
          transferable: true
          lines: approx 140-190
        - name: monitor_restart_after_policy_change
          description: Restarts tmux health monitor to pick up new escalation ladder.
          transferable: true
          lines: approx 190-235
    patterns:
      input_adaptation: Extract tar.gz archives into inputs/ preserving nested structure; enumerate all *.zip under inputs/;
        create a two-column mapping file (absolute zip path, relative path without .zip) used by HTCondor 'queue ... from
        $(input_list)'; mirror directory structure under results/ so transfer_output_remaps can target existing directories.
      job_submission: Stage submission via chunk files job_N.txt (default 1000 lines each). monitor_submit.sh submits one
        chunk at a time when condor_q job count is below MAX_JOBS, then moves the chunk into submitted_batches/ for idempotent
        restarts.
      resource_management: 'Two-layer resource control: (1) ORCA %maxcore and %pal nproc inside the job; (2) HTCondor RequestMemory/RequestCpus/RequestDisk
        in submit file. monitor_health.sh escalates held jobs through a predefined ladder using condor_qedit + condor_release,
        tracking per-job levels in resource_tracking.dat; disk holds trigger RequestDisk upgrade.'
      monitoring: 'Three tmux-based monitors: submit (capacity-aware drip feed), health (auto-heal held jobs by reason classification),
        backup (periodic verified archival with manifests and resume). status.sh provides a consolidated observability view.'
      result_collection: Each job produces results.tar.gz; HTCondor transfers it back and remaps it to results/<zip_relpath>_results.tar.gz
        on a shared filesystem. backup_results.sh later packs older *_results.tar.gz into backup_*.tar.gz archives in long-term
        storage, deleting originals only after verification.
      charge_mult: 'Derived from zip basename split on underscores: CHARGE is the second-to-last field and MULT is the last
        field (e.g., 32_0_1.zip => charge=0, mult=1).'
    known_issues:
    - scheduler: htcondor
      issue: start.sh attempts to replace __CONTAINER_IMAGE__ and __RESULTS_DIR__ placeholders in batch_job.submit, but batch_job.submit
        contains no such placeholders and instead hardcodes transfer_output_remaps to /groups/bsavoie2/GoldDIGR-DFT-SinglePoint/Zhao-Calcs/results.
        Outputs will be remapped to the wrong directory and may fail due to permissions/nonexistent path.
      fix: Add placeholders to batch_job.submit (e.g., __RESULTS_DIR__) and use them in transfer_output_remaps; or edit transfer_output_remaps
        directly to point to $SCRIPT_DIR/results. Validate directory exists and is writable.
      pattern: Avoid hardcoded absolute paths in submit descriptors; use templated tokens replaced by the launcher and verify
        substitution actually matches file content.
    - scheduler: htcondor
      issue: Container image path is defined in both start.sh and run_wrapper.sh, but start.sh does not propagate changes
        into run_wrapper.sh; jobs may run with an incorrect/nonexistent SIF path and fail immediately.
      fix: 'Use a single source of truth: either pass container path via environment/macro into run_wrapper.sh, or template
        CONTAINER_IMAGE in run_wrapper.sh and replace it in start.sh.'
      pattern: Centralize runtime artifact paths (containers) and ensure launch-time configuration updates all execution points.
    - scheduler: htcondor
      issue: start.sh claims to start tmux monitors, but tmux new-session commands are commented out; no jobs will be submitted
        automatically unless the user manually starts monitor_submit.sh.
      fix: Uncomment or re-enable tmux session creation, or provide a non-tmux fallback that runs monitors in background with
        nohup/systemd.
      pattern: Ensure the driver script actually launches required daemons/monitors; keep documentation and implementation
        consistent.
    - scheduler: htcondor
      issue: apply_memory_fix.sh claims it updates the container path to a shared project location, but it does not edit run_wrapper.sh
        (or any file) to change CONTAINER_IMAGE.
      fix: Implement sed replacement in run_wrapper.sh (and/or start.sh) for CONTAINER_IMAGE, or remove the claim from the
        script header.
      pattern: Fix scripts should be idempotent and truthful; verify each promised change is implemented.
    - scheduler: htcondor
      issue: Required Apptainer .sif image is not included and there is no fetch/build step; workflow fails if the image is
        missing on shared storage.
      fix: Provide a documented build recipe or an OSDF/CVMFS distribution method; add preflight checks in start.sh/run_wrapper.sh
        to verify the SIF exists and is readable on submit and execute nodes.
      pattern: External artifacts must be provisioned explicitly; add preflight validation and clear acquisition steps.
    glue_strategy: HTCondor submit file queues per-zip jobs; a wrapper script runs Apptainer exec to invoke the containerized
      compute script; monitors in tmux manage staged submission, auto-healing, and backups.
    reusable_for:
    - Any HTCondor-based high-throughput workflow needing chunked submission with queue-capacity gating
    - Containerized scientific codes on opportunistic clusters using Apptainer with bind-mounted working directories
    - Auto-healing patterns for held HTCondor jobs using HoldReason classification + condor_qedit escalation ladders
    - Wall-time aware multi-step jobs that must produce partial-but-usable outputs and support round-2 resubmission
    - Verified archival/backup loops with manifests, atomic rename, and safe deletion of originals
    _status: complete
  Perovskite-ligand-screening:
    input_type: ligand_library
    input_format: Directory of ligand geometries as .xyz (one per ligand, e.g., NH3_2C_Angew-1+H_minimized.xyz) optionally
      generated from SMILES enumeration; paired with per-ligand TAFFI-style .db forcefield files after parametrization; plus
      a per-run config.txt for MD submission.
    output_type: stability_screening_results
    output_format: Per-ligand stability metrics (bond quadratic elongation and angle variance) aggregated across multiple
      MD replicates into stability.out and stabilities.out; optional SQLite DB updates; optional ML model artifacts (trained
      classifiers, metrics plots).
    computation:
      tool: LAMMPS + ORCA/xTB + AmberTools (antechamber) + TAFFI utilities + scikit-learn
      type: script
      container: none (assumes host-installed scientific software and HPC modules)
      key_features:
      - Enumerate ligand candidates from SMILES and generate 3D xyz geometries (OpenBabel/RDKit).
      - 'Batch ligand parametrization: optional geometry optimization (ORCA or xTB), ORCA ESP singlepoints, charge fitting,
        and TAFFI-style db generation.'
      - Build 2D perovskite monolayer bulk MD systems per ligand and submit multiple replicate LAMMPS runs via Slurm.
      - Parse LAMMPS trajectories to quantify BX6 octahedral distortion metrics and classify stability.
      - Collect/aggregate stability outcomes and optionally insert/update results in an SQLite database.
      - Train and evaluate ML classifiers on engineered features to predict stability labels.
    scheduler_tested:
    - slurm
    infrastructure:
      filesystem: shared
      filesystem_details: Assumes a shared POSIX filesystem visible to submit and compute nodes; workflow creates many per-ligand/per-run
        subdirectories and relies on in-place files (sbatch, squeue, reading/writing trajectories).
      container_delivery: none
      container_path: n/a
      mpi: host_openmpi
      mpi_scheduler_integration: LAMMPS submission script loads openmpi module and typically runs MPI-enabled LAMMPS; integration
        is via Slurm sbatch with -N/-n; actual mpirun/srun invocation is expected in generated submit.sh (partially shown).
      gpu_required: false
      internet_required: false
      special_requirements:
      - 'Slurm commands available: sbatch, squeue.'
      - 'Host installations required: ORCA (4.x), xTB (optional), LAMMPS, AmberTools/antechamber, OpenBabel (pybel), RDKit,
        NumPy/SciPy, scikit-learn, imbalanced-learn, seaborn/matplotlib.'
      - Cluster module system assumed in generated LAMMPS submit scripts (module load gcc/openmpi/etc.).
      - Hard-coded default paths in step0/make_db.py point to /depot/... locations; must be overridden for other sites.
    files:
