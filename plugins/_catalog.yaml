        concepts:
        - name: chunked_submission_with_queue_cap
          description: Split large job lists into chunks and submit only when queue has capacity.
          transferable: true
          lines: 'Workflow Phases / Monitor: Submission'
        - name: auto_heal_held_jobs
          description: Detect held jobs and apply automated fixes (release, resource escalation).
          transferable: true
          lines: 'Monitor: Health / Resource Escalation'
        - name: walltime_aware_worker
          description: Worker script checks remaining time before starting tasks and uses watchdog to kill long tasks to allow
            packaging.
          transferable: true
          lines: Wall-Time Awareness
        - name: round2_resubmission
          description: Create second-round inputs for partial jobs using status.json and skip.txt to avoid recomputation.
          transferable: true
          lines: Round-2 Resubmission
        - name: results_backup_aggregation
          description: Pack many result tarballs into verified backup archives and delete originals after verification.
          transferable: true
          lines: 'Monitor: Backup'
      start.sh:
        role: entry_point
        description: 'One-button launcher: preflight, extract tarballs to inputs/, build file_list.txt, mirror results/ dirs,
          split into job_*.txt chunks, configure batch_job.submit via sed, and start tmux monitors (submit/health/backup).'
        concepts:
        - name: preflight_and_bootstrap
          description: Validate required files and inputs; create working directories; make scripts executable.
          transferable: true
          lines: 1-120
        - name: input_inventory_manifest
          description: Generate file_list.txt mapping absolute zip path to relative output stem for remapping.
