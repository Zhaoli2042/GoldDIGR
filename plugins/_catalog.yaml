          transferable: true
          lines: approx. 220-330
      scripts/submit_irc_analysis_from_finished.sh:
        role: driver
        description: 'Submits per-parent-folder IRC analysis jobs for zips listed in finished.txt: detects zips needing IRC_Analysis
          and containing finished_irc.trj; throttles by BATCHNAME; fills irc_analysis.submit.template placeholders and sbatch
          submits.'
        concepts:
        - name: parent_folder_batching
