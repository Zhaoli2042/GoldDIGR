        - OMPI_MCA_hwloc_base_binding_policy=none
      key_features:
      - Batch DFT single-point energy calculations per molecule geometry using ORCA (wB97X-V/def2-TZVP, RIJCOSX, CHELPG, Loewdin,
        Mayer)
      - Post-processing with Multiwfn to compute Mayer, Wiberg (Lowdin), and Fuzzy bond order matrices
      - HTCondor staged submission (chunked lists) with queue-cap throttling
      - 'Auto-healing of held jobs: transfer failures auto-release; memory/CPU/disk holds trigger resource escalation via
