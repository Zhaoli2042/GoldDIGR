          lines: 285-360
        - name: status_json_contract
          description: Emit status.json with overall status and per-molecule statuses used by prepare_round2.sh.
          transferable: true
          lines: 390-470
        - name: results_packaging
          description: Create results.tar.gz containing selected outputs and status.json for HTCondor transfer.
          transferable: true
          lines: 480-520
      status.sh:
        role: operational
        description: 'Quick status dashboard: summarizes condor_q, chunk submission progress, held job reasons, maxed jobs,
          local results count, backup count/size, tmux sessions, and resource escalation tracking.'
        concepts:
        - name: lightweight_ops_dashboard
          description: Single script to summarize workflow state from filesystem + scheduler queries.
          transferable: true
          lines: 1-170
    patterns:
      input_adaptation: Extract *.tar.gz into inputs/ preserving nested structure; enumerate all *.zip; build file_list.txt
        lines as 'zip_abspath, zip_relpath_no_ext' where zip_relpath_no_ext mirrors inputs/ relative path without .zip; HTCondor
        queues over this list.
      job_submission: 'Chunked submission: split file_list into job_*.txt (default 1000 lines) and submit sequentially when
        condor_q count < MAX_JOBS; move submitted chunks to submitted_batches/ for restart safety.'
      resource_management: Health monitor inspects held jobs; on memory/cpu holds, escalates RequestMemory/RequestCpus through
        predefined levels and releases; on disk holds, sets RequestDisk to 40GB; tracks escalation in resource_tracking.dat;
        stops auto-release at max level.
      monitoring: 'Three tmux-based long-running monitors: submit (throttle), health (auto-heal), backup (archive). Health
        monitor classifies HoldReason strings and applies targeted remediation.'
      result_collection: Worker always produces results.tar.gz; HTCondor transfers it back and remaps to results/<zip_relpath>_results.tar.gz;
        backup monitor later aggregates many result tarballs into backup_*.tar.gz with manifests and verification.
      charge_mult: 'Parsed from zip basename: CHARGE = second-to-last underscore field; MULT = last underscore field (e.g.,
        05_-1_1.zip => -1, 1).'
    known_issues:
    - scheduler: htcondor
      issue: 'Backup path mismatch: docs/status/prepare_round2 expect backups under /ospool/ap40/data/$USER/dft_energy_backups/,
        but backup_results.sh writes to /ospool/uw-shared/projects/ND_Savoie/$USER/...; backups may fail or be undiscoverable
        for status/round-2 scanning.'
      fix: Unify DEST_BASE and project naming across backup_results.sh, status.sh, and prepare_round2.sh; choose one canonical
        base path and update all scripts accordingly.
      pattern: Keep a single source of truth for storage destinations; reuse shared config file or environment variable.
    - scheduler: htcondor
      issue: 'Container image token not used: start.sh replaces __CONTAINER_IMAGE__ in batch_job.submit, but submit file hardcodes
        +SingularityImage to a shared path; per-user container path is ignored and may be inaccessible.'
      fix: Replace hardcoded +SingularityImage with __CONTAINER_IMAGE__ token (or read from submit macro) so start.sh can
        configure it.
      pattern: Avoid hardcoding site/user-specific container URIs; parameterize via tokens/macros.
    - scheduler: htcondor
      issue: 'run_orca_wbo.sh unzips using basename only: it calls unzip on $ZIP_FILENAME (basename of argument) rather than
        the provided path; if HTCondor places the transferred zip under a different name/path, unzip fails.'
      fix: Use unzip on the original argument path (unzip -q -j "$ZIP_ARGUMENT") or ensure transfer renames into cwd; optionally
        add 'transfer_input_files = ..., $(zip_abspath)' plus 'arguments = $(zip_filename)' with explicit rename.
      pattern: When schedulers pass absolute paths, do not discard them; operate on the argument path or normalize robustly.
    - scheduler: htcondor
      issue: 'Inconsistent project name derivation for backups: backup_results.sh uses PROJECT_NAME from parent dir of script
        dir; status.sh/prepare_round2.sh use PROJECT_PARENT from parent of pwd/script dir differently; can cause lookup in
        wrong backup folder.'
      fix: Standardize project naming (e.g., set PROJECT_NAME in a config file written by start.sh and sourced by all scripts).
      pattern: Derive run identifiers once and persist them; avoid recomputing with slightly different heuristics.
    - scheduler: htcondor
      issue: 'sed -i portability: start.sh uses GNU sed -i without suffix; fails on BSD/macOS sed, leaving submit file unconfigured.'
      fix: Use portable sed invocation (detect OS; use sed -i'' on BSD) or write to temp file then mv.
      pattern: Prefer portable text substitution patterns in cross-platform launchers.
    glue_strategy: Submit-side bash scripts generate and manage HTCondor queue inputs and monitors; execute-side bash driver
      runs inside a container and returns a single results.tar.gz which HTCondor remaps into a structured results tree.
    reusable_for:
    - Any high-throughput HTC workflow needing staged HTCondor submission with queue caps and restart-safe chunk tracking
    - Containerized scientific compute + post-processing pipelines that must run under strict wall-time limits and still return
      partial, resumable outputs
    - Automated remediation of held HTCondor jobs via HoldReason classification and condor_qedit-based resource escalation
    - Round-2 resubmission patterns using a status manifest (status.json) plus skip lists to avoid recomputation
    - Verified backup aggregation of many small result artifacts into fewer archives with manifests and safe deletion
    _status: complete
  DFT-singlepoint-CRC-Condor:
    input_type: golddigr
    input_format: One or more .tar.gz archives containing nested directories of per-job .zip inputs; each .zip contains molecule
      .xyz files (often under a subfolder) and is named with underscore-delimited fields where the last two fields are charge
      and multiplicity (e.g., 32_0_1.zip => charge=0 mult=1).
    output_type: 'Per input .zip: a *_results.tar.gz placed into a mirrored nested directory under results/, containing ORCA
      outputs (.out/.inp), copied .xyz, Multiwfn bond order matrices/logs, and status.json indicating per-molecule completion/timeout
      for round-2 resubmission; plus optional long-term backup tarballs of older results.'
    computation:
      tool: ORCA + Multiwfn (bond order analysis) executed via Apptainer inside HTCondor jobs
      type: container
      container: Apptainer/Singularity .sif image containing /opt/orca (orca, orca_2mkl) and /opt/Multiwfn_bin/Multiwfn_noGUI;
        executed with bind mount of the HTCondor scratch working directory
      key_features:
      - Single-point DFT (wB97X-V/def2-TZVP, RIJCOSX) for multiple molecule geometries per job
      - Multiwfn Mayer/Wiberg/Fuzzy bond order matrices extracted from ORCA Molden output
      - Wall-time aware execution with watchdog kill + partial completion tracking (status.json)
      - Round-2 resubmission support using skip.txt to avoid recomputing completed molecules
      - HTCondor staged submission (chunked input lists) with auto-healing of held jobs via condor_qedit/condor_release
      - Periodic results archiving to long-term shared storage with verification and manifests
    scheduler_tested:
    - sge
    - htcondor
    infrastructure:
      filesystem: shared
      filesystem_details: 'Shared filesystem present across nodes (probe: shared paths include /scratch and /afs; workflow
        hardcodes shared group paths under /groups/...). HTCondor also uses file transfer for per-job inputs/outputs (transfer_input_files/transfer_output_files),
        but results are remapped to an absolute shared results directory.'
      container_delivery: local_path
      container_path: /groups/bsavoie2/zli43/orca_6_1_1-zip-multiwfn-2.sif
      mpi: inside_container
      mpi_scheduler_integration: No host MPI detected (probe). ORCA parallelism uses internal OpenMPI inside container; run_orca_wbo.sh
        sets OMPI_MCA_rmaps_base_oversubscribe=1 and OMPI_MCA_hwloc_base_binding_policy=none to avoid slot/binding errors
        on HTCondor execute nodes.
      gpu_required: false
      internet_required: false
      special_requirements:
      - 'Apptainer runtime available on execute nodes (/usr/bin/apptainer; probe: apptainer 1.4.5)'
      - HTCondor client tools available on submit node for monitors (condor_q, condor_submit, condor_qedit, condor_release)
      - tmux required for background monitors as designed (submit/health/backup sessions)
      - Write access to shared results directory and backup destination under /groups/bsavoie2/zli43/$USER
      - zip/unzip, tar, find, awk, sed available on submit node; unzip/zip used by prepare_round2.sh on submit node
      - SIF image must be pre-staged at the configured shared path (plugin does not fetch/build it)
    container_interface:
    - name: orca_6_1_1-zip-multiwfn-2.sif
      runtime: apptainer
      image: /groups/bsavoie2/zli43/orca_6_1_1-zip-multiwfn-2.sif
