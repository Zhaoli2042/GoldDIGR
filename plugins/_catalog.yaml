          lines: 225-260
        - name: tmux_monitor_orchestration
          description: Start/stop named tmux sessions to run long-lived monitors.
          transferable: true
          lines: 300-360
      add_data.sh:
        role: operational
        description: 'Incrementally add new tar.gz inputs to an existing run: extract into inputs/, compute set-difference
          vs file_list.txt, append new entries, create new job chunk files continuing numbering, and restart only the submit
          monitor.'
        concepts:
        - name: idempotent_incremental_ingest
          description: Use comm on sorted lists to add only new inputs without duplicating tracked work.
          transferable: true
          lines: 60-190
        - name: chunk_number_continuation
          description: Detect highest existing job_N.txt across pending and submitted_batches and continue numbering.
          transferable: true
          lines: 200-270
        - name: selective_monitor_restart
          description: Restart only the submission monitor to pick up new chunks while leaving health/backup running.
          transferable: true
          lines: 280-340
      batch_job.submit:
        role: adapter
        description: 'HTCondor submit description: runs run_orca_wbo.sh with a zip path argument; transfers the script and
          zip; returns results.tar.gz and remaps it into results/ nested structure; sets resource requests and logs.'
        concepts:
        - name: htcondor_file_transfer_model
          description: transfer_input_files and transfer_output_files used to isolate compute jobs from submit filesystem.
          transferable: true
          lines: 15-35
        - name: output_remap_to_shared_results_tree
          description: transfer_output_remaps maps generic results.tar.gz to a structured path based on zip_relpath.
