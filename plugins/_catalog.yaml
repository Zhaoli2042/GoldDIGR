plugins:
  xTB-wbo-scan-Slurm:
    input_type: zip_archive
    input_format: Per-TS zip archives (e.g., 12_1_2.zip) containing a TS folder with finished_irc.trj (multi-XYZ trajectory)
      and related YARP/TSOPT artifacts; plus a text file listing finished TS directories (finished.txt or sample_list.txt
      depending on script).
    output_type: Augmented zip archives containing an xTB-scan/ folder with per-frame WBO/BEM CSVs and reactive_summary.csv;
      plus an optional global JSONL summary (SCO_WBO_summary.jsonl) aggregating reactive bond slopes and spin-crossover events
      across zips.
    computation:
      tool: xTB (with tblite spin-polarized pass + standard property pass)
      type: script
      container: none (host execution via modules/conda); apptainer available but not used by provided scripts
      key_features:
      - 'Per-frame spin scan: run xTB with multiple UHF values to detect best spin state and possible spin crossover frames'
      - Bond order / bond electron matrix extraction from xTB WBO output and conversion to dense per-frame CSV matrices
      - "Reactive event summarization by thresholding |\u0394(BEM)| between first and last frames and emitting a transposed\
        \ time-series CSV"
      - 'Post-hoc summarization over many zips: compute top slope events per reactive bond and emit JSONL records'
    scheduler_tested:
    - sge
    - htcondor
    infrastructure:
      filesystem: shared
      filesystem_details: Shared paths detected (/scratch, /afs, /users). Scripts reference absolute paths in finished lists
        and operate in-place on parent directories containing many .zip files; no HTCondor transfer directives present.
      container_delivery: local_path
      container_path: ''
      container_interface:
        runtime: apptainer
        version: 1.4.5-1.el9
        used_by_workflow: false
      mpi: none
      mpi_scheduler_integration: No MPI usage in provided scripts; SLURM template loads openmpi but workflow appears single-process
        per job. Host probe reports MPI not found on host by default.
      gpu_required: false
      internet_required: true
      special_requirements:
      - Python 3 with numpy, pandas, tqdm installed (summarizer requires numpy/pandas; scan script uses tqdm and multiprocessing)
      - xTB executable available on PATH (both tblite and standard modes invoked)
      - unzip command available (submission script inspects zip contents)
      - SLURM environment for provided submission helper (sbatch/squeue); target probe lists SGE/HTCondor but helper is SLURM-specific
      - Module system (environment-modules) and conda module assumed by spin_bo.submit.template
    files:
      spin_wbo_scan.py:
        role: driver
        description: "Implements core xTB-based spin/WBO scan logic over multi-frame XYZ trajectories: parses trajectories,\
          \ runs xTB in two passes (spin-polarized energy via tblite; properties via standard xTB), parses WBO outputs, writes\
          \ per-frame bond order and bond electron matrix CSVs, and summarizes reactive elements via thresholded \u0394(BEM).\
          \ As provided, the script is truncated mid-function and lacks the end-to-end CLI/driver and packaging steps."
        concepts:
        - name: multi-XYZ trajectory parsing
          description: Reads concatenated XYZ blocks (e.g., finished_irc.trj) into per-frame (symbols, coords, comment) records.
          transferable: true
          lines: ~240-310
        - name: spin-state parity heuristic
          description: Computes total electrons from atomic numbers and charge; sets base UHF=0 for even-electron systems
            else 1.
          transferable: true
          lines: ~330-360
        - name: two-pass xTB execution pattern
          description: Pass 1 uses --spinpol --tblite for stable spin-polarized energies and HOMO-LUMO gap; Pass 2 uses standard
            xTB with --pop --wbo to extract charges/WBO.
          transferable: true
          lines: ~365-430 (pass 1), ~432+ (pass 2 begins but truncated)
        - name: WBO file robust parsing
          description: Parses xTB .wbo in either pair-list (i j value) or matrix form; normalizes to dict of (i<j)->wbo.
          transferable: true
          lines: ~190-240
        - name: BEM (bond electron matrix) CSV generation
          description: Writes dense per-frame CSV matrices for bond electrons (off-diagonal 2*WBO; diagonal estimated as nominal
            valence minus incident WBO sum) and bond orders (off-diagonal WBO).
          transferable: true
          lines: ~95-175
        - name: reactive element summarization (transposed time series)
          description: "Loads all frame_*_bond_electrons.csv, finds entries with |\u0394|>=threshold between first/last, and\
            \ writes reactive_summary.csv with rows=frames and columns=flagged bonds/atoms."
          transferable: true
          lines: ~40-95
        - name: element tables for electrons/valence
          description: Provides EL_TO_Z for total electron counting and NOMINAL_VALENCE for diagonal BEM estimation.
          transferable: true
          lines: ~15-75 (valence), ~175-190 (Z table)
      submit_spin_bo_from_finished.sh:
        role: adapter
        description: "Queue-throttled SLURM submission helper: reads a list of finished TS directories, derives unique parent\
          \ block directories, inspects each parent\u2019s zip files to find those with finished_irc.trj but lacking xTB-scan/,\
          \ and submits one analysis job per parent using a submit template. Avoids duplicate submissions by job name and\
          \ enforces a batch-tag job limit."
        concepts:
        - name: parent directory deduplication from finished list
          description: Transforms TS-level paths into unique parent directories via dirname and sort -u.
          transferable: true
          lines: ~35-60
        - name: zip content gating
          description: Uses unzip -l + grep to detect whether a zip already contains xTB-scan/ and whether it contains finished_irc.trj
            to decide if processing is needed.
          transferable: true
          lines: ~70-110
        - name: queue throttling by batch tag
          description: Polls squeue and limits concurrent jobs matching a batch name; sleeps between checks.
          transferable: true
          lines: ~140-190
        - name: template-based job script materialization
          description: Replaces placeholders (JOBNAME_PLACEHOLDER, FILEPATH) in a submit template to generate per-parent sbatch
            scripts.
          transferable: true
          lines: ~155-180
        - name: job name derivation from path
          description: Extracts an index from path segments (/All-XYZ or /all-pdf-xyz) and combines with block basename for
            stable job naming.
          transferable: true
          lines: ~115-150
      summarize_sco_wbo.py:
        role: operational
        description: 'Post-processing summarizer: reads finished.txt, scans parent directories for zip archives that contain
          xTB-scan/reactive_summary.csv, computes per-bond time-series slopes and top slope events, extracts TS frame (max
          energy) from finished_irc.trj, optionally reads spin crossover metadata from xTB-scan/spin_crossover_frames.txt
          and spin_scan_summary.csv, and writes one JSON record per zip to a JSONL output.'
        concepts:
        - name: TS frame detection from trajectory
          description: Parses finished_irc.trj as repeated XYZ blocks and defines TS as the frame with maximum energy in comment
            line.
          transferable: true
          lines: ~70-140
        - name: zip introspection and selective extraction
          description: Uses zipfile to locate members by suffix and read only needed files (reactive_summary.csv, spin crossover
            files, finished_irc.trj).
          transferable: true
          lines: ~45-70, ~200-290
        - name: reactive bond slope event detection
          description: Computes finite-difference slopes per reactive column and records top-N |slope| events with frame/value.
          transferable: true
          lines: ~140-200
        - name: JSONL emission for scalable aggregation
          description: Writes one JSON object per processed zip for downstream indexing/analysis.
          transferable: true
          lines: ~290-360
      spin_bo.submit.template:
        role: config
        description: SLURM batch script template that loads conda and modules, activates a conda env, and runs run_analysis.sh
          on a specified parent directory (FILEPATH placeholder).
        concepts:
        - name: module + conda environment activation
          description: Loads conda module and activates a named environment before running analysis.
          transferable: true
          lines: ~15-25
        - name: single-node single-task batch configuration
          description: Requests 1 node, 1 task, 4 hours; intended for serial analysis over many zips within a parent directory.
          transferable: true
          lines: ~1-14
    patterns:
      input_adaptation: Treat each TS zip as the unit of work; detect presence of finished_irc.trj inside zip; extract/parse
        multi-XYZ trajectory into per-frame XYZs; run per-frame xTB; write results into an xTB-scan/ subfolder and reinsert
        into the original zip.
      job_submission: One job per parent directory containing many TS zips; job script generated from a template with placeholders;
        submission throttled by counting queued jobs with a batch tag.
      resource_management: 'Implicit: serial execution per job; optional parallelism inside scan script via ProcessPoolExecutor
        for per-frame computations (not shown end-to-end due to truncation).'
      monitoring: Queue monitoring via squeue polling; duplicate job avoidance by exact job-name match; zip-level idempotency
        by checking for xTB-scan/ marker.
      result_collection: Per-frame CSVs (bond_electrons, bond_orders) plus reactive_summary.csv stored under xTB-scan/ inside
        each zip; global aggregation into SCO_WBO_summary.jsonl by scanning zips and extracting only required members.
      charge_mult: Charge inferred from zip filename parts (e.g., 12_1_2.zip -> charge=1, mult=2) in the broader workflow
        context; spin scan uses UHF values and parity heuristic (even/odd electron count) to set baseline UHF and detect best_UHF
        per frame (implied by summarizer expecting spin_scan_summary.csv).
    known_issues:
    - scheduler: slurm
      issue: Submission helper and template are SLURM-specific (sbatch/squeue), but target environment probe lists SGE and
        HTCondor as available schedulers.
      fix: Provide SGE qsub and/or HTCondor submit equivalents, or document SLURM-only usage; alternatively wrap submission
        in a scheduler-abstraction layer.
      pattern: Avoid hard-coding scheduler commands; isolate scheduler adapters per site.
    - scheduler: any
      issue: spin_wbo_scan.py is truncated mid-function and lacks CLI/driver logic and packaging steps; cannot run end-to-end.
      fix: 'Restore full script: argument parsing, frame loop, xTB invocation for multiple UHF values, WBO parsing, CSV writing,
        reactive_summary generation, and zip insertion under xTB-scan/.'
      pattern: Ensure the entry-point script is complete and includes a reproducible main() with explicit inputs/outputs.
    - scheduler: any
      issue: run_analysis.sh referenced by spin_bo.submit.template is missing; submitted jobs will fail immediately.
      fix: Add run_analysis.sh that iterates over zips in FILEPATH, runs spin_wbo_scan.py per zip/trajectory, and updates
        the zip with xTB-scan/ outputs.
      pattern: Templates must only reference version-controlled scripts shipped with the plugin.
    - scheduler: any
      issue: 'Input list filename mismatch: submit script expects sample_list.txt while summarizer defaults to finished.txt.'
      fix: Standardize on one filename (e.g., finished.txt) or pass --finished to summarizer and make submit script configurable
        via flag/env.
      pattern: Use consistent conventions or expose filenames as CLI args across pipeline stages.
    - scheduler: any
      issue: Summarizer requires xTB-scan/reactive_summary.csv inside each zip; generation and insertion into zip are not
        guaranteed by provided (incomplete) scan workflow.
      fix: 'In run_analysis.sh or completed scan driver: always create xTB-scan/, run summarize_reactive_elements(), and write
        reactive_summary.csv; then update zip with that folder.'
      pattern: Downstream consumers should validate required artifacts and upstream stages should enforce artifact contracts.
    glue_strategy: Parent-directory batch jobs inspect and update many TS zip archives in-place, adding an xTB-scan/ results
      folder that downstream summarization reads directly from zip members.
    reusable_for:
    - "Any workflow that needs per-frame semiempirical bond order tracking along a trajectory (IRC/MD) and event detection\
      \ via \u0394(BEM) thresholds"
    - Pipelines that must be idempotent over archives by checking for marker folders/files inside zips before recomputation
    - Large-scale summarization over many archived jobs using JSONL emission and selective zip member reads
    - Scheduler-throttled submission patterns where one job processes a directory of many small tasks to reduce queue pressure
    _status: complete
  DFT-singlepoint-Anvil-Slurm:
    input_type: golddigr_zip_archives
    input_format: A directory tree of per-structure ZIP archives produced by GoldDIGR; each ZIP is named like <id>_<charge>_<multiplicity>.zip
      and contains a folder of the same basename with one or more .xyz geometries (e.g., input.xyz, ts_final_geometry.xyz,
      finished_first.xyz, etc.).
    output_type: Per-archive results tarballs and status metadata
    computation:
      tool: ORCA + Multiwfn (bond order analysis)
      type: script
      container: Not provided; runtime assumed to contain /opt/orca and /opt/Multiwfn_bin (likely via Apptainer/Singularity
        image or preinstalled software).
      key_features:
      - Runs ORCA single-point DFT (wB97X-V/def2-TZVP with RIJCOSX) on multiple candidate geometries per ZIP
      - Runs Multiwfn in no-GUI mode to compute Mayer, Wiberg, and Fuzzy bond order matrices from ORCA outputs
      - Implements wall-time watchdog and partial-completion behavior with JSON status reporting
      - Batch submission manager with queue-throttling and audit-based resubmission support
    scheduler_tested:
    - sge
    - htcondor
    infrastructure:
      filesystem: shared
      filesystem_details: Probe indicates shared paths (/scratch, /afs). Scripts use absolute paths under /anvil/scratch/...
        implying a shared scratch filesystem across compute nodes.
      container_delivery: local_path
      container_path: Not specified in plugin; Apptainer runtime detected but no .sif URI/path is referenced in scripts.
      container_interface:
        runtime: apptainer
        version: 1.4.5-1.el9
        invocation_pattern: Not present; expected to be wrapped by missing slurm_job.sb or external site wrapper.
      mpi: inside_container
      mpi_scheduler_integration: Host MPI not found by probe; run_orca_wbo_anvil.sh sets OMPI_MCA_* variables to force TCP/vader
        and disable UCX, suggesting ORCA/MPI is expected to be bundled with the runtime environment (container or ORCA distribution).
        No scheduler-provided MPI integration is used.
      gpu_required: false
      internet_required: false
      special_requirements:
      - Slurm commands (sbatch/squeue) are required by manager.sh and audit.sh, but Slurm is not listed in the detected schedulers;
        site must provide Slurm or adapt scripts to SGE/HTCondor.
      - ORCA binaries must exist at /opt/orca (orca, orca_2mkl) and Multiwfn_noGUI must be on PATH via /opt/Multiwfn_bin.
      - unzip and tar must be available on execution nodes.
      - Environment-modules exists on host, but no module load directives are included.
    files:
      audit.sh:
        role: operational
        description: Audits previously submitted jobs by checking for expected final result tarballs in OUTPUT_ROOT and querying
          the scheduler for job presence; writes a failed_jobs.txt list suitable for resubmission.
        concepts:
        - name: submission_log_contract
          description: 'Parses submitted_jobs.log as pipe-delimited records: timestamp | job_id | rel_path | zip_path; relies
            on manager.sh to generate this exact format.'
          transferable: true
          lines: approx. 14-23, 27-49
        - name: completion_signal_by_artifact
          description: Defines job completion as existence of OUTPUT_ROOT/<REL_PATH>_results.tar.gz.
          transferable: true
          lines: approx. 25-41
        - name: failure_list_for_retry
          description: Emits failed_jobs.txt lines as '<ZIP_PATH> <REL_PATH>' for downstream retry tooling.
          transferable: true
          lines: approx. 42-46
        - name: scheduler_query_slurm_squeue
          description: Uses squeue -j to determine whether a job is still running/pending vs failed.
          transferable: true
          lines: approx. 34-45
      manager.sh:
        role: driver
        description: Reads a prepared file list of ZIP archives and relative identifiers, throttles submissions to a maximum
          concurrent job count, submits jobs via sbatch, and records job IDs to submitted_jobs.log.
        concepts:
        - name: queue_throttling
          description: Implements a concurrency cap by polling squeue and waiting when CURRENT_JOBS >= MAX_JOBS.
          transferable: true
          lines: approx. 23-55
        - name: idempotent_skip_if_output_exists
          description: Skips submission if OUTPUT_ROOT/<REL_PATH>_results.tar.gz already exists.
          transferable: true
          lines: approx. 31-38
        - name: batch_submission_and_jobid_capture
          description: Submits with sbatch and extracts job ID from 'Submitted batch job <id>' output.
          transferable: true
          lines: approx. 57-69
        - name: submission_audit_trail
          description: Appends timestamp, job id, rel_path, zip_path to submitted_jobs.log for later auditing.
          transferable: true
          lines: approx. 71-74
        - name: hardcoded_user_and_jobname_filter
          description: Counts jobs using squeue -u x-zli65 and grep 'orca_wbo', coupling throttling to a specific username
            and job-name pattern.
          transferable: false
          lines: approx. 44-46
        - name: external_batch_script_dependency
          description: Delegates actual execution, staging, and result placement to slurm_job.sb (not included).
          transferable: true
          lines: approx. 62
      path_preparation.sh:
        role: adapter
        description: Mirrors the input directory structure into the results directory and generates file_list.txt mapping
          absolute ZIP paths to relative paths (without .zip extension).
        concepts:
        - name: directory_structure_mirroring
          description: Uses find to recreate all directories from SOURCE_DIR under TARGET_DIR.
          transferable: true
          lines: approx. 1-8
        - name: zip_inventory_manifest
          description: 'Creates file_list.txt with lines: ''<absolute_zip_path>, <relative_path_with_subfolders>''; then strips
            ''.zip'' from both fields.'
          transferable: true
          lines: approx. 10-14
        - name: relative_path_as_result_key
          description: Uses the ZIP's relative path (including subfolders) as the stable identifier for naming outputs.
          transferable: true
          lines: approx. 10-14
      run_orca_wbo_anvil.sh:
        role: entry_point
        description: 'Per-job computation script: extracts charge/multiplicity from ZIP basename, unzips geometries, runs
          ORCA single-point calculations for a fixed set of candidate .xyz files, runs Multiwfn bond order analyses, writes
          status.json, and packs outputs into results.tar.gz.'
        concepts:
        - name: charge_multiplicity_from_filename
          description: Parses ZIP basename split by '_' to obtain CHARGE (NF-1) and MULT (NF).
          transferable: true
          lines: approx. 14-22
        - name: orca_input_template_generation
          description: Writes ORCA .inp files with method/basis, SCF settings, PAL nproc=4, and maxcore; uses *xyzfile with
            parsed charge/multiplicity.
          transferable: true
          lines: approx. 108-121
        - name: multi_geometry_attempt_loop
          description: Iterates over a prioritized list of geometry names (finished_last, finished_last_opt, ts_final_geometry,
            finished_first, finished_first_opt, input) and processes those present.
          transferable: true
          lines: approx. 86-99, 101-176
        - name: round2_skiplist
          description: Optional skip.txt marks molecules already completed in a previous round; statuses recorded as complete_previous_round.
          transferable: true
          lines: approx. 74-85
        - name: walltime_watchdog
          description: Implements a watchdog that kills ORCA processes near walltime; also skips remaining molecules when
            remaining time < BUFFER_SECONDS.
          transferable: true
          lines: approx. 31-72, 101-116, 132-141
        - name: orca_failure_classification
          description: Distinguishes timeout-killed vs generic ORCA failure based on remaining time; cleans large intermediate
            files on failure.
          transferable: true
          lines: approx. 123-141, 170
        - name: multiwfn_batch_mode_bond_orders
          description: Runs Multiwfn_noGUI with scripted menu inputs to produce Mayer/Wiberg/Fuzzy bond order matrices (bndmat.txt)
            and renames them per molecule.
          transferable: true
          lines: approx. 145-166
        - name: status_json_manifest
          description: Writes status.json summarizing overall status (complete/partial), counts, and per-molecule status strings.
          transferable: true
          lines: approx. 179-203
        - name: result_packaging
          description: Creates results.tar.gz containing .out, .xyz, .inp, *_mat.txt, *_log.out, and status.json from the
            working directory.
          transferable: true
          lines: approx. 205-208
    patterns:
      input_adaptation: GoldDIGR outputs are consumed as ZIP archives; path_preparation.sh inventories all *.zip under SOURCE_DIR
        and produces a manifest mapping absolute ZIP path to a relative identifier (REL_PATH) used for output naming and directory
        mirroring.
      job_submission: manager.sh performs per-zip job submission (one Slurm job per ZIP) with a concurrency cap enforced by
        polling the queue; job IDs are recorded for later auditing.
      resource_management: ORCA resource control is set via %pal nproc 4 and %maxcore 1500 in generated inputs; manager.sh
        assumes 4 cores/job and caps total jobs to bound total cores. Wall-time is managed by a watchdog and by skipping remaining
        molecules when time is low.
      monitoring: audit.sh monitors completion by checking for expected output artifacts and uses scheduler queries to distinguish
        running vs failed; run_orca_wbo_anvil.sh emits status.json for per-molecule health and partial completion.
      result_collection: Per-job script packs outputs into results.tar.gz; the overall workflow expects a renamed/moved artifact
        at OUTPUT_ROOT/<REL_PATH>_results.tar.gz (implied to be handled by the missing batch wrapper).
      charge_mult: 'Derived from ZIP filename tokens: <...>_<charge>_<multiplicity>.zip; charge is second-to-last token, multiplicity
        is last token.'
    known_issues:
    - scheduler: slurm
      issue: 'Missing batch wrapper: manager.sh calls ''sbatch slurm_job.sb ...'' but slurm_job.sb is not included, so jobs
        cannot be launched and staging/collection behavior is undefined.'
      fix: Provide slurm_job.sb that (1) stages ZIP into the job working directory, (2) invokes run_orca_wbo_anvil.sh with
        the correct ZIP path or after cd, (3) renames/moves results.tar.gz to $OUTPUT_ROOT/${REL_PATH}_results.tar.gz, and
        (4) sets job name to match manager's grep filter (orca_wbo) if throttling relies on it.
      pattern: Always include the scheduler wrapper script and ensure it implements staging + final artifact placement consistent
        with manager/audit expectations.
    - scheduler: slurm
      issue: 'Input list path mismatch: manager.sh expects INPUT_LIST at /anvil/scratch/.../file_list.txt, but path_preparation.sh
        writes file_list.txt to the current working directory unless run from the expected location.'
      fix: In path_preparation.sh, redirect output explicitly to /anvil/scratch/x-zli65/GoldDIGR-DFT-Singlepoint/file_list.txt
        or cd to that directory before writing.
      pattern: Avoid implicit CWD outputs; use absolute paths for generated manifests when downstream scripts hardcode locations.
    - scheduler: slurm
      issue: 'ZIP staging/path handling: run_orca_wbo_anvil.sh unzips ''$ZIP_FILENAME'' (basename only), requiring the ZIP
        to be present in the working directory; manager passes an absolute ZIP_PATH to the batch job.'
      fix: In slurm_job.sb, copy $ZIP_PATH into $SLURM_TMPDIR or $SLURM_SUBMIT_DIR and run from that directory, or modify
        run_orca_wbo_anvil.sh to unzip '$ZIP_ARGUMENT' directly.
      pattern: Ensure compute scripts consistently use absolute paths or explicitly stage inputs into the working directory.
    - scheduler: slurm
      issue: 'Results naming/collection mismatch: run_orca_wbo_anvil.sh creates results.tar.gz but the workflow completion
        check expects $OUTPUT_ROOT/${REL_PATH}_results.tar.gz.'
      fix: In slurm_job.sb (or in run_orca_wbo_anvil.sh), rename and move results.tar.gz to the expected final name in OUTPUT_ROOT.
      pattern: Define a single authoritative completion artifact name and enforce it in the compute script or wrapper.
    - scheduler: any
      issue: 'Binary/container provisioning undefined: scripts assume /opt/orca and /opt/Multiwfn_bin exist, but no container
        image, module loads, or installation steps are provided.'
      fix: Provide an Apptainer/Singularity image path/URI and wrapper invocation, or add module load/install documentation
        and checks that fail fast with clear errors.
      pattern: Make runtime dependencies explicit and validated at job start (which orca, Multiwfn_noGUI, versions).
    - scheduler: slurm
      issue: 'audit.sh dependency on submitted_jobs.log: running audit.sh before manager.sh (or with an empty/missing log)
        will produce errors or misleading output.'
      fix: Add a guard in audit.sh to check for existence/non-emptiness of submitted_jobs.log and exit with instructions if
        missing.
      pattern: Operational scripts should validate required inputs/logs before processing.
    - scheduler: environment
      issue: 'Scheduler mismatch with detected environment: probe lists SGE and HTCondor, but scripts use Slurm commands (sbatch/squeue).'
      fix: Port manager/audit to qsub/qstat (SGE) or condor_submit/condor_q (HTCondor), or ensure Slurm is available on the
        target cluster.
      pattern: Align orchestration scripts with the schedulers actually available; avoid hardcoding scheduler-specific commands
        without abstraction.
    glue_strategy: 'Two-phase orchestration: (1) prepare a manifest of ZIP inputs and mirrored output directories, (2) submit
      one job per ZIP via a scheduler wrapper that stages inputs, runs the compute entrypoint, and deposits a uniquely named
      result tarball for audit/skip logic.'
    reusable_for:
    - Any high-throughput quantum chemistry single-point workflow that runs multiple candidate geometries per system and aggregates
      outputs into a single per-system artifact
    - Workflows needing queue-throttled bulk submission with a persistent submission log and an audit/resubmit loop
    - Pipelines requiring wall-time-aware partial completion and machine-readable status.json summaries
    - Containerized (or preinstalled) scientific tools that require non-interactive CLI driving (e.g., Multiwfn menu scripting)
      and deterministic output collection
    _status: complete
  DFT-singlepoint-OSG-Condor:
    input_type: tarball
    input_format: One or more *.tar.gz archives; each contains nested directories of *.zip files. Each zip filename encodes
      charge and multiplicity as ..._<charge>_<mult>.zip and contains up to 6 molecule XYZs (finished_last, finished_last_opt,
      ts_final_geometry, finished_first, finished_first_opt, input).
    output_type: 'Per input zip: a *_results.tar.gz (remapped into results/ mirroring input structure) containing ORCA outputs,
      Multiwfn bond-order matrices/logs, and status.json; plus optional long-term backup tarballs aggregating many *_results.tar.gz
      files.'
    computation:
      tool: ORCA + Multiwfn (inside Apptainer/Singularity container) orchestrated by HTCondor
      type: container
      container: Apptainer/Singularity SIF providing /opt/orca/* and /opt/Multiwfn_bin/Multiwfn_noGUI; fetched via osdf://
        URI in HTCondor +SingularityImage
      container_interface:
        image_uris:
        - osdf:///ospool/uw-shared/projects/ND_Savoie/orca_6_1_1-zip-multiwfn-2.sif
        - osdf:///ospool/ap40/data/${USER}/orca_6_1_1-zip-multiwfn-2.sif
        runtime: singularity/apptainer via HTCondor
        entrypoints:
        - run_orca_wbo.sh (executed as HTCondor job executable; runs inside container context)
        in_container_paths:
          orca_bin_dir: /opt/orca
