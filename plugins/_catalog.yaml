      - tmux on submit node for background monitors
      - GNU userland expected (sed -i without suffix; stat -c; awk/comm/find)
      - Apptainer/Singularity support on execute nodes via HTCondor +SingularityImage
      - OSDF access required if using osdf:// container delivery (probe indicates OSDF/CVMFS not present on this machine;
        workflow assumes OSPool environment where OSDF is available)
      - 'Backup destination path must exist and be writable (see known issues: mismatch between scripts)'
    files:
      README.md:
        role: config
        description: 'High-level description of the workflow: ORCA single-point + Multiwfn WBO per XYZ; HTCondor + container;
          lists major scripts.'
        concepts:
        - name: two-stage_compute_and_analysis
          description: Run quantum chemistry compute (ORCA) then analyze outputs (Multiwfn bond orders).
          transferable: true
          lines: 1-20
      WORKFLOW.md:
        role: config
        description: 'Operational documentation: directory layout, monitors, resource escalation policy, wall-time handling,
