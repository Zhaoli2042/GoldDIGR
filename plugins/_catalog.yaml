          transferable: true
          lines: approx. 5-30
      scripts/new-check_job_status.sh:
        role: monitoring
        description: Scans expected job outputs for each (xyz,charge,mult) and classifies as finished (.zip exists), crashed
          (dir exists or -crashed.zip exists), or untouched; writes finished.txt/crashed.txt/untouched.txt.
        concepts:
        - name: triage_lists
