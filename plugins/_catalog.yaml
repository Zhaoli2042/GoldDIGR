          lines: 90-140
      monitor_health.sh:
        role: operational
        description: 'Periodic health monitor: inspects held jobs; auto-releases transfer holds; escalates RequestMemory/RequestCpus
          on memory/cpu holds; increases RequestDisk on disk holds; logs unknown holds; tracks per-job escalation levels.'
        concepts:
        - name: resource_escalation_state
          description: Persist escalation level per job in resource_tracking.dat to make decisions across cycles.
