          transferable: true
          lines: 52-79
        - name: container_bind_mount_pattern
          description: Separates read-only inputs (/work/input) from writable outputs (/work/output or /work) to avoid permission
            issues.
          transferable: true
          lines: 95-123
        - name: two_phase_pipeline
          description: Runs xyz_prep.py first to generate workflow_status.json and ts_guess.xyz, then runs full DFT workflow.
          transferable: true
          lines: 88-176
        - name: tarball_handshake_interface
          description: Creates results.tar.gz containing ts_guess.xyz, workflow_status.json, and inputs; passes it to container
            workflow as --input.
          transferable: true
          lines: 178-208
        - name: workflow_override_by_bind_mount
          description: "Bind-mounts plugin\u2019s run_dft_verification.py over container\u2019s version to customize behavior\
            \ without rebuilding container."
          transferable: true
          lines: 214-252
        - name: centralized_logging
          description: Redirects stdout/stderr to logs/dft_${SGE_TASK_ID}.out/.err for array tasks.
          transferable: true
          lines: 33-41
        - name: final_status_promotion
          description: Copies output/workflow_status.json to job root as final_status.json for easier monitoring.
          transferable: true
          lines: 266-274
      .golddigrignore:
        role: config
        description: Excludes large job directories, test datasets, and heavy ORCA artifacts from packaging/ingestion.
        concepts:
        - name: artifact_exclusion
          description: Ignore patterns for binary/large outputs (gbw/hess/trj) and job/test directories.
          transferable: true
          lines: 1-18
    patterns:
      input_adaptation: "Standardize upstream geometries into per-job R.xyz/P.xyz/TS.xyz; preprocessing computes BEM-derived\
        \ bond_changes and seeds output/workflow_status.json + ts_guess.xyz; then package into results.tar.gz as the container\
        \ workflow\u2019s single input artifact."
      job_submission: SGE array job; job_list.txt provides deterministic mapping from SGE_TASK_ID to job directory; per-task
        logs written to logs/.
      resource_management: Fixed PE smp 16 and maxcore 4000 MB/core passed to ORCA; walltime requested via h_rt=72:00:00;
        no dynamic escalation implemented.
      monitoring: Out-of-band monitoring via check_status.py reading workflow_status.json/final_status.json; no auto-resubmission/health
        daemon.
      result_collection: 'Per job: output/ contains full artifacts and results.tar.gz; final_status.json copied to job root
        for quick scanning; check_status.py aggregates across jobs.'
      charge_mult: Primary source is per-job config.json created by setup_jobs.sh from reaction_info.txt; sge script reads
        charge/mult from config.json and passes to preprocessing; workflow_status.json also stores charge/mult under input_data.
    known_issues:
    - scheduler: sge
      issue: Plugin snapshot missing required configs/ templates (configs/config_original.json and configs/config_r2scan.json)
        and reaction_info.txt; setup_jobs.sh hard-fails without them.
      fix: Provide configs/ directory with the two template JSON files and include reaction_info.txt (tab-separated rxn_name,
        charge, mult).
      pattern: Batch setup scripts should validate and/or ship required templates and parameter tables.
    - scheduler: sge
      issue: "scripts/run_dft_verification.py is truncated mid-function; bind-mounting it over the container\u2019s workflow\
        \ will cause immediate Python syntax/import failure."
      fix: Ensure the full run_dft_verification.py is included with complete CLI/argparse and stage implementations before
        overriding container script.
      pattern: When overriding container entrypoints, the override must be complete and version-matched to container expectations.
    - scheduler: sge
      issue: scripts/xyz_prep.py is truncated and lacks argparse CLI; sge_dft_pipeline.sh calls it with flags, so preprocessing
        will fail.
      fix: Add a main() with argparse supporting --reactant/--product/--ts/--charge/--mult/--output/--prep-only and call process_xyz_inputs().
      pattern: External preprocessing adapters must expose stable CLIs because batch scripts treat them as binaries.
    - scheduler: sge
      issue: 'Path/layout mismatch risk: sge_dft_pipeline.sh bind-mounts ${PIPELINE_DIR}/scripts/xyz_prep.py and scripts/run_dft_verification.py;
        if files are not located under scripts/, container execution fails.'
      fix: Enforce repository layout with scripts/ subdirectory or update bind paths in sge_dft_pipeline.sh accordingly.
      pattern: Keep on-disk layout consistent with bind-mount assumptions; add preflight checks.
    - scheduler: sge
      issue: 'Container dependency coupling: workflow assumes /opt/dft_workflow/run_dft_workflow.sh exists and calls /opt/dft_workflow/run_dft_verification.py;
        if container differs, Step 3 fails.'
      fix: Pin and document container version; add a preflight singularity exec test for required paths.
      pattern: Treat container as an API; validate required entrypoints before submitting arrays.
    - scheduler: sge
      issue: YARP BEM may fail if /opt/yarp not present; preprocessing may degrade to OpenBabel or fail to detect meaningful
        bond changes.
      fix: Use a container that includes YARP or ensure OpenBabel python bindings are installed; optionally allow user-specified
        bond_changes override.
      pattern: Provide graceful fallbacks and clear warnings for optional chemistry toolchains.
    glue_strategy: SGE bash driver orchestrates a two-step container run (preprocess then full workflow) using bind-mount
      overrides and a tarball handoff artifact.
    reusable_for:
    - Any containerized quantum chemistry workflow needing scheduler array orchestration with per-task directory inputs and
      centralized logs
    - Workflows that need a preprocessing adapter to compute reaction metadata (bond changes/reactive atoms) before running
      expensive calculations
    - Pipelines that override container-internal Python modules via bind-mount to customize behavior without rebuilding images
    - Mixed-basis ORCA workflows that focus higher-level basis on metals and reactive centers inferred from reaction changes
    _status: incomplete
    _unresolved:
    - opt/dft_workflow/scripts/xyz_prep.py
    - work/scripts/xyz_prep.py
  xtb-freq-tsopt-irc-spinwbo-yarp-sankey:
    input_type: xyz
    input_format: One XYZ geometry per file (from golddigr extraction). XYZ comment line may optionally encode charge; otherwise
      workflow samples charges -1/0/+1.
    output_type: 'Per-input TS/IRC characterization bundle: TSOPT+IRC outputs zipped per (structure, charge, mult); optional
      post-processing adds xTB spin/WBO scan tables, YARP BEM/adjacency per-frame artifacts, and Sankey HTML/SVG diagrams;
      plus cross-zip JSONL summaries.'
    computation:
      tool: xTB + Pysisyphus + YARP (post-processing) + Plotly Sankey builder
      type: script
      container: none (module+conda based execution on SLURM cluster)
      key_features:
      - Charge sampling across -1/0/+1 with multiplicity inferred from electron parity
      - TS optimization (RS-P-RFO) and IRC (Euler predictor-corrector) via Pysisyphus using xTB backend
      - Post-hoc spin-polarized xTB scan along IRC frames with WBO extraction and reactive summary CSVs
      - YARP bond-electron matrix (BEM) and adjacency extraction per frame; TS frame detection from max energy in IRC trajectory
      - Electron-transport Sankey diagrams from BEM time series; optional SVG export
    scheduler_tested:
    - slurm
    infrastructure:
      filesystem: shared
      filesystem_details: Assumes shared POSIX filesystem visible to submit host and compute nodes; workflows use absolute
        paths listed in text files and rely on sbatch/squeue plus zip/unzip operating on shared directories.
      container_delivery: none
      container_path: ''
      mpi: host_openmpi
      mpi_scheduler_integration: No explicit mpirun/srun usage; OpenMPI module is loaded but Pysisyphus parallelism is via
        'pal' setting and xTB internal threading; SLURM ntasks-per-node=1 in templates.
      gpu_required: false
      internet_required: false
      special_requirements:
      - 'Environment modules: conda/anaconda, intel-mkl, openmpi'
      - 'Conda envs referenced: copy-classy-yarp (submission utilities) and another-yarp (runtime)'
      - 'External executables required on PATH: xtb, pysis (Pysisyphus CLI), zip, unzip'
      - 'Python packages required: yarp, numpy, pandas, tqdm, plotly (and kaleido optional for SVG export)'
    files:
      README.md:
        role: config
        description: "Human-facing overview of intended pipeline stages (xTB freq \u2192 TSOPT \u2192 IRC \u2192 spin/WBO\
          \ \u2192 YARP \u2192 Sankey), charge/multiplicity policy, and HPC module/conda expectations."
        concepts:
        - name: stage_gating
          description: Defines conceptual gates (imag freq threshold, file existence) for progressing between stages.
          transferable: true
          lines: approx. 10-45
        - name: charge_multiplicity_policy
          description: Use charge from XYZ comment if present; else sample -1/0/+1; multiplicity chosen as lowest allowed.
          transferable: true
          lines: approx. 47-60
      plugin.yaml:
        role: config
        description: Machine-readable manifest describing stages, gates, charge strategy, and declared outputs.
        concepts:
        - name: manifest_stage_model
          description: Declarative stage list with gate types (imaginary_freq, file_exists, directory_exists).
          transferable: true
          lines: approx. 1-45
        - name: declared_outputs_contract
          description: Enumerates expected artifacts across TSOPT/IRC, xTB-scan, IRC_Analysis, and Sankey.
          transferable: true
          lines: approx. 46-75
      scripts/5_master_workflow.sh:
        role: driver
        description: 'Primary SLURM submission driver: reads a list of XYZ base paths, loops charges -1/0/+1, computes multiplicity,
          creates per-(charge,mult) workdir, fills Pysisyphus YAML templates and sbatch template, throttles submissions by
          BATCHNAME job count, and submits TSOPT+IRC jobs that zip results and delete workdir.'
        concepts:
        - name: queue_throttling
          description: Implements a simple job limiter by counting squeue jobs matching a batch prefix and sleeping until
            below limit.
          transferable: true
          lines: approx. 20-120
        - name: job_dedup_by_name
          description: Avoids duplicate submissions by grepping squeue job names for an exact suffix match.
          transferable: true
          lines: approx. 70-105
        - name: template_substitution
          description: Uses sed and bash string replacement to fill charge/mult and job name placeholders in YAML and sbatch
            templates.
          transferable: true
          lines: approx. 105-150
        - name: charge_sampling_loop
          description: Runs three independent charge states per structure when charge not embedded in XYZ.
          transferable: true
          lines: approx. 55-160
      scripts/6_restart_untouched.sh:
        role: driver
        description: 'Restart driver for untouched jobs: reads full job directory paths, parses charge/multiplicity from directory
          naming convention, reconstructs original XYZ path, regenerates templates, throttles and submits.'
        concepts:
        - name: path_parsing_convention
          description: Parses FULL_DIR_PATH formatted as <base>_<charge>_<mult> to recover inputs.
          transferable: true
          lines: approx. 35-95
        - name: restart_idempotency_by_zip
          description: Skips jobs if final .zip exists; cleans stale directories before resubmission.
          transferable: true
          lines: approx. 95-170
      scripts/7_restart_crashed.sh:
        role: driver
        description: "Restart driver for crashed jobs: reads crashed job dirs, requires a '-crashed.zip' marker, deletes stale\
          \ dir and crashed archive, resubmits with modified queue/walltime by editing template content (standby\u2192normal;\
          \ 4h\u2192168h)."
        concepts:
        - name: resource_escalation_by_template_patch
          description: Edits sbatch script text to change partition/qos and walltime for reruns.
          transferable: true
          lines: approx. 90-170
        - name: crash_marker_archive
          description: Uses presence of <job>-crashed.zip as a manual crash indicator to trigger restart.
          transferable: true
          lines: approx. 40-90
      scripts/calculate_mult.py:
        role: operational
        description: Computes lowest multiplicity (1 if even electrons else 2) from XYZ atom list and integer charge.
        concepts:
        - name: electron_parity_multiplicity
          description: Multiplicity heuristic based on total electron parity after charge adjustment.
          transferable: true
          lines: approx. 1-85
        - name: atomic_number_lookup
          description: "Element\u2192Z dictionary for electron counting."
          transferable: true
          lines: approx. 10-45
      scripts/compute_sco_wbo_stats.py:
        role: operational
        description: 'Aggregates statistics from SCO_WBO_summary.jsonl: alignment of TS frame and spin-crossover frames with
          top bond-slope event frames.'
        concepts:
        - name: topk_event_alignment_metrics
          description: Computes % of cases where a reference frame lies in union of top-1/2/3 event frames.
          transferable: true
          lines: approx. 1-140
      scripts/irc_sankey_zoomsvg_fixed.py:
        role: operational
        description: Builds Sankey diagrams (transport and two-rail) from per-frame BEM/AM matrices; supports aggregation
          toggles and SVG export via kaleido; reads ts_frame and frame matrices under IRC_Analysis.
        concepts:
        - name: bem_to_transport_flow
          description: Derives electron ownership flow by solving a minimum-norm flow on an incidence matrix using dR constraints.
          transferable: true
          lines: approx. 1-220
        - name: bem_parsing_heuristics
          description: Loads labelled matrices from CSV; heuristically detects whether off-diagonals are V or 2V and rescales.
          transferable: true
          lines: approx. 20-120
        - name: sankey_link_pruning
          description: Keeps topK links above min_frac of total; aggregates remainder optionally.
          transferable: true
          lines: approx. 220-340
      scripts/metal_ligand/__init__.py:
        role: adapter
        description: Package marker for metal_ligand helpers used by YARP analysis.
        concepts: []
      scripts/metal_ligand/yarp_helpers.py:
        role: adapter
        description: 'Utility wrappers for YARP: silent yarpecule creation with optional explicit charge; small helpers for
