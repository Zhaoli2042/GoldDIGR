        concepts:
        - name: charge_mult_from_filename
          description: Derive charge and multiplicity from the last two underscore-separated fields of the zip basename.
          transferable: true
          lines: 20-45
        - name: walltime_precheck_and_watchdog
          description: Before each molecule, ensure enough time remains; watchdog kills ORCA near wall limit to allow packaging.
