      mpi: inside_container
      mpi_scheduler_integration: 'No host MPI detected (probe). ORCA parallelism uses OpenMPI inside container; run_orca_wbo.sh
        sets OMPI_MCA_* to avoid slot/binding errors under HTCondor. Note: ORCA %pal nproc is fixed at 4 regardless of HTCondor
        CPU escalation.'
      gpu_required: false
      internet_required: false
      special_requirements:
