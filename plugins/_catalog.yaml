    patterns:
      input_adaptation: Treat each golddigr XYZ as a base path; create per-charge/multiplicity working directories named <base>_<charge>_<mult>,
        copy XYZ to input.xyz, and fill Pysisyphus YAML templates with sed.
      job_submission: Many independent SLURM jobs submitted via sbatch; submission throttled by counting squeue jobs with
        a batch prefix; job names encode dataset index + block + molecule + charge to enable de-duplication.
      resource_management: Manual escalation for crashed jobs by patching sbatch template content (partition/qos and walltime).
        Pysisyphus resources set via pal/mem in YAML templates.
      monitoring: 'Filesystem-based triage: finished if <job>.zip exists; crashed if leftover directory or -crashed.zip marker
        exists; untouched otherwise. Queue de-duplication via squeue job-name grep.'
      result_collection: Primary results are zipped per job and original work directories removed. Post-processing reopens
        zips, extracts minimal files, appends new analysis folders back into the same zip (zip -u).
      charge_mult: "Multiplicity computed as lowest allowed by electron parity (even\u21921, odd\u21922) given charge; charge\
        \ either parsed externally (not implemented here) or sampled across -1/0/+1; some post-processing parses charge from\
        \ zip filename token."
    known_issues:
    - scheduler: slurm
      issue: 'Declared xtb_frequency stage is missing: no script/template produces xtb_freq.out, so imaginary-frequency gate
        cannot be applied and manifest does not match implementation.'
      fix: Add an xTB Hessian/frequency sbatch template and integrate it into the driver (or remove stage from manifest).
        Ensure output file name matches gate (xtb_freq.out).
      pattern: Keep manifest stages synchronized with actual drivers; every gate must have a producing step.
    - scheduler: slurm
      issue: No orchestrator consumes plugin.yaml; drivers submit TSOPT/IRC directly and do not implement stage gating across
        the full pipeline.
      fix: Implement a top-level orchestrator that reads plugin.yaml and runs stages conditionally, or update plugin.yaml
        to reflect the actual operational flow (submit + posthoc analysis).
      pattern: Declarative manifests require an executor; otherwise treat manifest as documentation only.
    - scheduler: slurm
      issue: 'Template path/name mismatch: scripts expect TSOPT.yaml.template, TSOPT-IRC.yaml.template, job_tsopt.submit.template
        in CWD, but repository stores templates under templates/ with different names (underscores).'
      fix: Standardize template names/locations or update scripts to reference templates/TSOPT_yaml.template etc.; add sanity
        checks for template existence.
      pattern: Avoid implicit CWD dependencies; resolve templates relative to script directory.
    - scheduler: slurm
      issue: 5_master_workflow.sh uses undefined variable XYZ_PATH when computing block name, producing empty/incorrect job
        names and breaking queue de-duplication.
      fix: Replace XYZ_PATH with XYZ_FILE_PATH (or PATH_NO_SLASH) and enable 'set -u' to catch undefined variables.
      pattern: Enable strict bash modes in drivers to prevent silent name/logic corruption.
    - scheduler: slurm
      issue: irc_analysis.submit.template requires $PKG_DIR to locate scripts, but $PKG_DIR is not set by the template or
        submitter; job fails sanity checks.
      fix: Set PKG_DIR in the submit script (e.g., export PKG_DIR=/path/to/plugin) or embed absolute paths during template
        substitution.
      pattern: Do not rely on undeclared environment variables inside batch templates.
    - scheduler: slurm
      issue: Several Python entry points are truncated in the provided payload (spin_wbo_scan.py, yarp_results_builder.py,
        irc_sankey_zoomsvg_fixed.py), making them syntactically incomplete.
      fix: Ship complete scripts; add CI that runs 'python -m py_compile' on all python files.
      pattern: Validate packaging integrity; compile-check prevents silent truncation regressions.
    - scheduler: slurm
      issue: environment.yml excerpt does not guarantee presence of xtb, pysisyphus CLI, or yarp Python package; runtime may
        fail if not provided by modules/conda.
      fix: Add explicit dependencies (conda/pip) or document required module loads and PATH expectations; add preflight checks
        in batch scripts.
      pattern: For HPC workflows, include a preflight that asserts required executables/imports.
    glue_strategy: 'SLURM-first workflow: submit TSOPT/IRC jobs that self-archive to zip; later batch post-processing jobs
      reopen zips, run analyses, and append results back into the same archives.'
    reusable_for:
    - Any high-throughput TS/IRC screening where each input geometry fans out over charge states and results are archived
      per job
    - Workflows that need scheduler throttling and de-duplication by job-name conventions
    - Pipelines that post-process archived results in-place by extracting minimal members and updating the archive
    - Framewise trajectory analysis producing per-frame matrices/JSON plus downstream visualization (e.g., Sankey) from time
      series
    workflow_graph:
      entry_point: scripts/5_master_workflow.sh
      per_job_runner: templates/job_tsopt.submit.template
      nodes:
      - id: charge_mult_derivation
        type: adapter
        tool: python
        scripts:
        - scripts/calculate_mult.py
        templates: []
        inputs:
        - input.xyz
        outputs:
        - stdout(multiplicity)
        description: Derive lowest multiplicity for a given XYZ and charge (electron parity rule).
      - id: xtb_frequency
        type: compute
        tool: xtb
        scripts: []
        templates: []
        inputs:
        - input.xyz
        outputs:
        - xtb_freq.out
        description: GFN2-xTB Hessian/frequency screening to detect imaginary mode TS candidates.
      - id: tsopt
        type: compute
        tool: pysisyphus
        scripts:
        - templates/job_tsopt.submit.template
        templates:
        - path: templates/TSOPT_yaml.template
          placeholders:
          - CHARGE_PLACEHOLDER
          - MULT_PLACEHOLDER
        - path: templates/job_tsopt.submit.template
          placeholders:
          - JOBNAME_PLACEHOLDER
          - XXX
          - CHARGE_PLACEHOLDER
        inputs:
        - TSOPT.yaml
        - input.xyz
        outputs:
        - ts_final_geometry.xyz
        - XXX-tsopt.out
        description: Pysisyphus RS-P-RFO TS optimization using xTB; writes optimized TS geometry.
      - id: irc
        type: compute
        tool: pysisyphus
        scripts:
        - templates/job_tsopt.submit.template
        templates:
        - path: templates/TSOPT-IRC_yaml.template
          placeholders:
          - CHARGE_PLACEHOLDER
          - MULT_PLACEHOLDER
        inputs:
        - TSOPT-IRC.yaml
        - ts_final_geometry.xyz
        outputs:
        - finished_irc.trj
        - finished_first.xyz
        - finished_last.xyz
        - XXX-irc.out
        description: "Pysisyphus Euler predictor\u2013corrector IRC from optimized TS; writes trajectory and endpoints."
      - id: spin_wbo_scan
        type: analysis
        tool: python
        scripts:
        - scripts/run_analysis.sh
        - scripts/spin_wbo_scan.py
        templates: []
        inputs:
        - finished_irc.trj
        outputs:
        - xTB-scan/
        - xTB-scan/reactive_summary.csv
        - xTB-scan/spin_scan_summary.csv
        - xTB-scan/spin_crossover_frames.txt
        - xTB-scan/frame_*_bond_electrons.csv
        - xTB-scan/frame_*_bond_orders.csv
        description: Two-pass spin-polarized xTB scan (tblite energy + standard props) and per-frame WBO/BEM CSV extraction
          along IRC frames.
      - id: irc_analysis_yarp
        type: analysis
        tool: yarp
        scripts:
        - scripts/yarp_results_builder.py
        - scripts/metal_ligand/yarp_helpers.py
        - templates/irc_analysis.submit.template
        templates:
        - path: templates/irc_analysis.submit.template
          placeholders:
          - JOBNAME_PLACEHOLDER
          - FILEPATH
          - PLACEHOLDER
          - PKG_DIR
        inputs:
        - finished_first.xyz
        - finished_last.xyz
        - finished_irc.trj
        - input.xyz
        - ts_final_geometry.xyz
        outputs:
        - IRC_Analysis/
        - IRC_Analysis/finished_first/frame_00000.json
        - IRC_Analysis/finished_last/frame_00000.json
        - IRC_Analysis/finished_irc/ts_frame.txt
        - IRC_Analysis/*/frame_*.json
        - IRC_Analysis/*/frame_*_adjacency.csv
        - IRC_Analysis/*/frame_*_bond_electrons.csv
        description: Run YARP yarpecule-based adjacency + bond-electron matrix analysis for endpoints/TS/IRC frames; detect
          TS frame by max energy in finished_irc.trj.
      - id: sankey
        type: visualization
        tool: python
        scripts:
        - scripts/irc_sankey_zoomsvg_fixed.py
        - templates/irc_analysis.submit.template
        templates: []
        inputs:
        - IRC_Analysis/finished_irc/ts_frame.txt
        - IRC_Analysis/finished_irc/frame_*_bond_electrons.csv
        - IRC_Analysis/finished_irc/frame_*_adjacency.csv
        outputs:
        - IRC_Analysis/sankey/
        description: Generate electron-transport Sankey diagrams from BEM time series around TS window.
      - id: summarize_sco_wbo
        type: stats
        tool: python
        scripts:
        - scripts/summarize_sco_wbo.py
        templates: []
        inputs:
        - finished.txt
        - '*.zip'
        outputs:
        - SCO_WBO_summary.jsonl
        description: Aggregate per-zip TS frame, reactive bond slope events, and spin-crossover frames into JSONL summary.
      - id: compute_sco_wbo_stats
        type: stats
        tool: python
        scripts:
        - scripts/compute_sco_wbo_stats.py
        templates: []
        inputs:
        - SCO_WBO_summary.jsonl
        outputs:
        - stdout(statistics)
        description: Compute alignment statistics between TS/SCO frames and top bond-event frames from SCO_WBO_summary.jsonl.
      edges:
      - from: charge_mult_derivation
        to: xtb_frequency
        gate:
          type: custom
          file: ''
          threshold: null
          description: Multiplicity computed for a given charge state; workflow iterates charges -1/0/1 per XYZ.
      - from: xtb_frequency
        to: tsopt
        gate:
          type: imaginary_freq
          file: xtb_freq.out
          threshold: 20
          description: "Proceed only if an imaginary frequency with |\u03BD| > 20 cm\u207B\xB9 is detected in xtb_freq.out."
      - from: tsopt
        to: irc
        gate:
          type: file_exists
          file: ts_final_geometry.xyz
          threshold: null
          description: TS optimization must produce ts_final_geometry.xyz.
      - from: irc
        to: spin_wbo_scan
        gate:
          type: file_exists
          file: finished_irc.trj
          threshold: null
          description: IRC must produce finished_irc.trj; spin/WBO scan runs on this trajectory.
      - from: spin_wbo_scan
        to: irc_analysis_yarp
        gate:
          type: directory_exists
          file: xTB-scan
          threshold: null
          description: Spin/WBO scan must create xTB-scan/ (often appended back into the job zip).
      - from: irc_analysis_yarp
        to: sankey
        gate:
          type: directory_exists
          file: IRC_Analysis
          threshold: null
          description: YARP analysis must create IRC_Analysis/ with per-frame BEM/adjacency outputs.
      - from: sankey
        to: summarize_sco_wbo
        gate:
          type: custom
          file: ''
          threshold: null
          description: Summarization scans zips that contain xTB-scan/reactive_summary.csv (independent of Sankey), typically
            after spin_wbo_scan has been added to zips.
      - from: summarize_sco_wbo
        to: compute_sco_wbo_stats
        gate:
          type: file_exists
          file: SCO_WBO_summary.jsonl
          threshold: null
          description: Stats script requires SCO_WBO_summary.jsonl.
      execution_order:
      - charge_mult_derivation
      - xtb_frequency
      - tsopt
      - irc
      - spin_wbo_scan
      - irc_analysis_yarp
      - sankey
      - summarize_sco_wbo
      - compute_sco_wbo_stats
      template_placeholders:
        CHARGE_PLACEHOLDER: Net molecular charge to use in Pysisyphus xTB calculations (and in job naming).
        MULT_PLACEHOLDER: Spin multiplicity for the given charge (computed by scripts/calculate_mult.py).
        JOBNAME_PLACEHOLDER: SLURM job name string substituted into submission scripts.
        XXX: Basename token used to name pysisyphus stdout files (e.g., XXX-tsopt.out, XXX-irc.out).
        FILEPATH: Parent directory path containing zip archives to process (IRC analysis batch mode).
        PLACEHOLDER: SLURM account/allocation name in irc_analysis.submit.template.
        PKG_DIR: Root path to the installed plugin/package containing scripts/ (used to locate yarp_results_builder.py and
          irc_sankey_zoomsvg_fixed.py).
    _status: complete
