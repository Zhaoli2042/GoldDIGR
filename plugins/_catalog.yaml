        concepts:
        - name: queue_throttling
          description: Poll condor_q and enforce a maximum number of concurrent jobs.
          transferable: true
          lines: 20-90
        - name: restart_safe_submission
          description: Skip chunks already moved to submitted_batches/ to allow monitor restarts.
