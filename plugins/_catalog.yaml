      scripts/spin_wbo_scan.py:
        role: entry_point
        description: 'Runs two-pass xTB along IRC frames: pass1 spin-polarized tblite energies across UHF values; pass2 standard
          xTB properties (WBO, populations); writes per-frame BEM-like CSVs and summary tables; includes reactive summary
