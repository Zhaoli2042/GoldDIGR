          transferable: true
          lines: approx. 25-140
        - name: status_heuristics
          description: Finished determined by <job>.zip; crashed by leftover dir or manual crashed zip.
          transferable: true
          lines: approx. 90-135
      scripts/run_analysis.sh:
        role: driver
        description: 'Post-processing driver over .zip results: for each zip containing finished_irc.trj and lacking xTB-scan/,
          extracts trajectory to temp dir, runs spin_wbo_scan.py, then updates the zip with new xTB-scan/ outputs and cleans
