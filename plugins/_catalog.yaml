          lines: 50-140
        - name: round2_skip_semantics
          description: If skip.txt exists, mark molecules as complete_previous_round and skip computation.
          transferable: true
          lines: 145-175
        - name: orca_input_template
          description: Generate ORCA .inp with fixed method/basis and %pal nproc=4 and %maxcore=2500.
