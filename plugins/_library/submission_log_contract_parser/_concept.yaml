name: submission_log_contract_parser
description: Parse the pipe-delimited submitted_jobs.log contract used for auditing.
category: monitoring
interface:
  inputs:
  - SUBMIT_LOG
  outputs:
  - Emits parsed fields per line (TIMESTAMP JOB_ID REL_PATH ZIP_PATH)
invariants:
- 'Input records are pipe-delimited: TIMESTAMP|JOB_ID|REL_PATH|ZIP_PATH.'
- Fields may contain extra spaces; must xargs-trim REL_PATH/JOB_ID/ZIP_PATH.
variants:
  DFT-singlepoint-Anvil-Slurm_default:
    file: DFT-singlepoint-Anvil-Slurm_default.sh
    lines: 22
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr_orca_multiwfn_anvil
    notes: Used as a building block for audit/resubmit tooling.
