name: orca_input_template_generation
description: Generate an ORCA single-point .inp file for a given XYZ with fixed method/basis and resource settings.
category: science
interface:
  inputs:
  - MOL
  - CHARGE
  - MULT
  - XYZ_FILE
  outputs:
  - Writes ${MOL}.inp
invariants:
- Uses %pal nproc 4 and %maxcore 2500 (MB) regardless of scheduler CPU escalation.
- Uses *xyzfile {{CHARGE}} {{MULT}} {{XYZ_FILE}} and %base set to molecule name.
- Keep %pal nproc 4 end and %maxcore 1500 as the resource contract with the scheduler wrapper.
- Use '*xyzfile CHARGE MULT XYZ_FILE' (not inline coordinates).
- 'Keep keywords: wB97X-V def2-TZVP def2/J defgrid3 RIJCOSX CHELPG Loewdin Mayer.'
- Use *xyzfile CHARGE MULT XYZ_FILE.
- Set %pal nproc to match allocated CPUs; set %maxcore to match memory policy.
- 'Keep method line and blocks exactly as used: wB97X-V def2-TZVP def2/J defgrid3 RIJCOSX CHELPG Loewdin Mayer.'
variants:
  DFT-singlepoint-Anvil-Slurm_default:
    file: DFT-singlepoint-Anvil-Slurm_default.inp
    lines: 27
    scheduler: any
    tool: orca
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr_orca_multiwfn_anvil
    notes: Assumes XYZ_FILE exists in CWD.
  fixed_method_basis_singlepoint_template:
    file: fixed_method_basis_singlepoint_template.inp
    lines: 19
    scheduler: any
    tool: orca
    infrastructure:
      filesystem: isolated
    tested_by:
    - dft_energy_orca_multiwfn
    notes: Template is embedded in run_orca_wbo.sh.
  wb97xv_def2tzvp_singlepoint_template_with_bond_order_outputs:
    file: wb97xv_def2tzvp_singlepoint_template_with_bond_order_outputs.inp
    lines: 19
    scheduler: any
    tool: orca
    infrastructure:
      filesystem: any
    tested_by:
    - golddigr
    notes: From run_orca_wbo.sh.
