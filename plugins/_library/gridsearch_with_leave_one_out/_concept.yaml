name: gridsearch_with_leave_one_out
description: Hyperparameter tuning with GridSearchCV using Leave-One-Out CV and parallel workers.
category: science
interface:
  inputs:
  - X_train
  - y_train
  - model selector
  outputs:
  - reports (list)
  - clf (best estimator)
invariants:
- Use LeaveOneOut() for cv on small datasets.
- Return best_estimator_ after reporting.
variants:
  Perovskite-ligand-screening_default:
    file: Perovskite-ligand-screening_default.sh
    lines: 18
    scheduler: any
    tool: sklearn
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - ML/ML_all_model.py
    notes: The tuned parameter grids are model-specific and embedded in the function.
