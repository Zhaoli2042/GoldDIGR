name: input_consistency_validation_xyz_triplet
description: Validate that R/P/TS XYZ files exist, have matching atom counts, and identical element ordering.
category: monitoring
interface:
  inputs:
  - r_xyz
  - p_xyz
  - ts_xyz
  outputs:
  - (is_valid_bool
  - errors_list)
invariants:
- Element order must match exactly across files; mismatch is a hard error with first few diffs printed.
- Atom count mismatch is a hard error.
variants:
  DFT-COPT-TSOPT-CRC-SGE_default:
    file: DFT-COPT-TSOPT-CRC-SGE_default.sh
    lines: 70
    scheduler: any
    tool: any
    infrastructure:
      filesystem: any
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: Used in preprocessing adapter.
