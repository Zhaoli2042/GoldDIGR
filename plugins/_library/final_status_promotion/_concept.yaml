name: final_status_promotion
description: Promote output/workflow_status.json to job-root final_status.json for easier monitoring.
category: monitoring
interface:
  inputs:
  - OUTPUT_DIR
  - JOB_DIR
  outputs:
  - JOB_DIR/final_status.json
invariants:
- Copy only if workflow_status.json exists; do not fail job on missing status.
variants:
  DFT-COPT-TSOPT-CRC-SGE_default:
    file: DFT-COPT-TSOPT-CRC-SGE_default.sh
    lines: 13
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: Enables status_file_fallback.
