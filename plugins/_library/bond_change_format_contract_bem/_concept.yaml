name: bond_change_format_contract_bem
description: Compute and encode bond changes between reactant/product BEMs as a semicolon-separated string; count sigma changes.
category: science
interface:
  inputs:
  - bem_r
  - bem_p
  - elements
  outputs:
  - (bond_changes_string
  - sigma_change_count)
invariants:
- 'Bond change token format: ElemI{i}-ElemJ{j}:{r_str}>{p_str} with ''n'' for no bond.'
- 'Sigma change definition uses integer orders: 0->>0 or >0->0.'
variants:
  DFT-COPT-TSOPT-CRC-SGE_default:
    file: DFT-COPT-TSOPT-CRC-SGE_default.sh
    lines: 58
    scheduler: any
    tool: yarp | openbabel
    infrastructure:
      filesystem: any
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: Used to seed workflow_status.json.
