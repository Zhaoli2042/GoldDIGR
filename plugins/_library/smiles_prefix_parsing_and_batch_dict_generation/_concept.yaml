name: smiles_prefix_parsing_and_batch_dict_generation
description: Parse SMILES/PREFIX lines, skip already-done SMILES, and build batch JSON dicts mapping SMILES -> "out_dir:::prefix".
category: adapters
interface:
  inputs:
  - smiles_list_path
  - smiles_done_set
  - batch_size
  - GEO_DATA_OUT_PATH_MAIN
  - BATCH_DICT_SEPARATOR
  outputs:
  - batch_dicts (List[Dict[str
  - str]])
invariants:
- Output directories are index-based (str(i)) to keep stable layout across runs.
- Hard-fail if reaction_info.txt missing; warn-and-skip if reaction directory or xyz files missing.
- 'Batch dict value packs two fields using BATCH_DICT_SEPARATOR: ''out_dir:::prefix''.'
- 'Skip comment lines starting with # and skip empty rxn_name.'
- 'Input format is whitespace-separated: ''SMILES PREFIX'' (PREFIX optional).'
variants:
  Auto3D-GPU-Slurm_default:
    file: Auto3D-GPU-Slurm_default.sh
    lines: 41
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - purdue_standby_auto3d_auto_batch
    notes: This is the core chunk-management block for large SMILES lists.
  tsv_reaction_info_to_jobs_fanout_and_job_list:
    file: tsv_reaction_info_to_jobs_fanout_and_job_list.sh
    lines: 136
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: This is the full tested script body (also includes cartesian product + inline JSON patch).
