name: slurm_submit_throttle_by_batchtag
description: Queue-throttled SLURM submission loop that enforces a max number of queued/running jobs matching a batch tag.
category: scheduler
interface:
  inputs:
  - FINISHED_LIST_FILE
  - BATCHNAME
  - JOB_LIMIT
  - CHECK_EVERY
  - SUBMIT_TEMPLATE
  outputs:
  - sbatch submissions + generated per-parent submit files
invariants:
- Never exceed MAX_JOBS in queue; poll condor_q before each chunk submission.
- Submits only files ending with .sub from GPU_SUBMISSIONS_DIR.
- Move successfully submitted chunk file into submitted_batches/ to make restarts idempotent.
- Throttle is implemented by counting squeue job names containing the batch tag.
- Process chunk files in numeric order (job_1.txt, job_2.txt, ...).
- Submit chunks in numeric order (job_1, job_2, ...).
- Job counting uses squeue output filtered by a job-name substring; wrapper must set matching job name.
- Duplicate submission is avoided by exact job-name match in squeue output.
- Gate submission on total job count < MAX_JOBS.
- Throttle condition is CURRENT_JOBS < MAX_JOBS.
- Writes submitted filenames to submitted_jobs_list_auto3d_gpu.txt in CWD.
- Never resubmit a chunk already present in submitted_batches/.
- Hard cap prevents flooding scheduler (default max_submit=4900).
- Sleep-and-retry loop continues until below limit.
variants:
  xTB-wbo-scan-Slurm_default:
    file: xTB-wbo-scan-Slurm_default.sh
    lines: 140
    scheduler: slurm
    tool: any
    infrastructure:
