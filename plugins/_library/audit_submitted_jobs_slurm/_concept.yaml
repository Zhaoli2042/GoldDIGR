name: audit_submitted_jobs_slurm
description: Audit submitted jobs by checking completion artifact and querying Slurm; write failed_jobs.txt for retry.
category: monitoring
interface:
  inputs:
  - OUTPUT_ROOT
  - SUBMIT_LOG
  - FAILED_LOG
  outputs:
  - FAILED_LOG populated with retry lines
invariants:
- Reads SUBMIT_LOG with pipe-delimited contract.
- Completion is OUTPUT_ROOT/<REL_PATH>_results.tar.gz.
- If artifact missing and job not in squeue => mark FAILED and write '<ZIP_PATH> <REL_PATH>'.
variants:
  DFT-singlepoint-Anvil-Slurm_default:
    file: DFT-singlepoint-Anvil-Slurm_default.sh
    lines: 42
    scheduler: slurm
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr_orca_multiwfn_anvil
    notes: "This is the \u201CHEALTH MONITOR\u201D block for the workflow (detect failed/crashed)."
