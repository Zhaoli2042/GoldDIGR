name: submission_manager_slurm_throttled
description: 'End-to-end manager loop: read manifest, skip completed, throttle, submit, and log.'
category: scheduler
interface:
  inputs:
  - INPUT_LIST
  - OUTPUT_ROOT
  - SUBMIT_LOG
  - MAX_JOBS
  - CHECK_DELAY
  - USERNAME
  - JOBNAME_GREP
  - SBATCH_WRAPPER
  outputs:
  - Jobs submitted; SUBMIT_LOG updated
invariants:
- Status aggregation must point to the same ORIGINAL_SMILES_PATH used for batching.
- Throttle uses squeue -u USERNAME and grep JOBNAME_GREP.
- 'INPUT_LIST lines are: ''<ZIP_PATH>, <REL_PATH>'' with ZIP_PATH possibly ending in a comma.'
- Completion check uses OUTPUT_ROOT/<REL_PATH>_results.tar.gz.
- 'Submission uses: sbatch {{SBATCH_WRAPPER}} ZIP_PATH REL_PATH OUTPUT_ROOT.'
- Failed/missing SMILES lists are valid inputs to the batching driver (same SMILES PREFIX format).
variants:
  DFT-singlepoint-Anvil-Slurm_default:
    file: DFT-singlepoint-Anvil-Slurm_default.sh
    lines: 60
    scheduler: slurm
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr_orca_multiwfn_anvil
    notes: "This is the \u201CSUBMISSION\u201D block; it assumes an external Slurm wrapper exists."
  iterative_retry_until_complete_then_collect_outputs:
    file: iterative_retry_until_complete_then_collect_outputs.sh
    lines: 15
    scheduler: slurm
    tool: auto3d
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - README_purdue_standby
    notes: Extracted from README as a reusable operational pattern.
