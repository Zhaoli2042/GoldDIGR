name: artifact_exclusion_golddigrignore
description: Ignore patterns to exclude large job/test directories and heavy QC artifacts from packaging/ingestion.
category: monitoring
interface:
  inputs:
  - repository root
  outputs:
  - reduced ingest footprint
invariants:
- Exclude jobs/ and Test-DFT/ to avoid ingesting large datasets.
- Exclude ORCA binary artifacts (*.gbw, *.hess, *.carthess) and large trajectories (*_trj.xyz).
variants:
  DFT-COPT-TSOPT-CRC-SGE_default:
    file: DFT-COPT-TSOPT-CRC-SGE_default.sh
    lines: 25
    scheduler: any
    tool: any
    infrastructure:
      filesystem: any
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: Keep patterns as-is.
