name: array_index_manifest
description: Use job_list.txt as a deterministic mapping from array index to job directory name.
category: scheduler
interface:
  inputs:
  - job_list.txt
  - SGE_TASK_ID
  outputs:
  - JOB_NAME string
invariants:
- job_list.txt line N corresponds to task ID N; selection via sed -n '${SGE_TASK_ID}p'.
variants:
  DFT-COPT-TSOPT-CRC-SGE_default:
    file: DFT-COPT-TSOPT-CRC-SGE_default.sh
    lines: 18
    scheduler: sge
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: Extracted from sge_dft_pipeline.sh.
