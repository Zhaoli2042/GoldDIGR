name: orca_input_parser
description: Parse ORCA input files including multi-job blocks, header commands, %geom constraints, and xyz geometry blocks.
category: adapters
interface:
  inputs:
  - input
  outputs:
  - orca_dict (dict keyed by job number)
invariants:
- Supports $new_job splitting; carries forward N_proc if not redefined.
- Detects PAL in header to set N_proc.
- Parses charge/multiplicity from `* xyz` and `* xyzfile` lines.
variants:
  Perovskite-ligand-screening_default:
    file: Perovskite-ligand-screening_default.inp
    lines: 92
    scheduler: any
    tool: orca
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - MD/lib/file_parsers.py
    notes: Returns both raw content and parsed geometry/elements when present.
