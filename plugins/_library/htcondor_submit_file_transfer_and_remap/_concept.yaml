name: htcondor_submit_file_transfer_and_remap
description: HTCondor submit description that transfers inputs, runs a containerized executable, and remaps a generic output
  into a structured results tree.
category: scheduler
interface:
  inputs:
  - '{{SINGULARITY_IMAGE_URI}}'
  - '{{RESULTS_DIR_ABS}}'
  - '{{REQUEST_CPUS}}'
  - '{{REQUEST_MEMORY}}'
  - '{{REQUEST_DISK}}'
  - '{{INPUT_LIST_PATH}}'
  outputs:
  - Remapped results tarball at {{RESULTS_DIR_ABS}}/$(zip_relpath)_results.tar.gz plus logs/
invariants:
- Input list lines must be 'zip_abspath, zip_relpath' with comma+space delimiter to match queue statement.
- Job must always produce results.tar.gz; HTCondor remaps it using zip_relpath.
- 'Queue input list must be two columns: zip_abspath, zip_relpath (comma+space separated in this workflow).'
- Job must produce results.tar.gz in the execute directory for transfer_output_files.
- Outputs mounted read-write at a separate path (/work/output or /work).
- Inputs mounted read-only at a stable path (/work/input:ro).
- transfer_output_remaps must point to a writable shared filesystem path.
- transfer_input_files must include both the executable script and the per-job zip.
- Invoke /bin/bash <compute_script> <zip_arg> inside container.
- Bind $PWD:$PWD so transferred inputs/outputs are visible inside container.
variants:
  DFT-singlepoint-OSG-Condor_default:
    file: DFT-singlepoint-OSG-Condor_default.sh
    lines: 44
    scheduler: htcondor
    tool: any
    infrastructure:
      filesystem: htcondor_transfer
    tested_by:
    - dft_energy_orca_multiwfn
    notes: In original plugin, +SingularityImage is hardcoded; to make start.sh token replacement effective, use __CONTAINER_IMAGE__.
  queue_from_two_column_csv_and_remap_results_to_nested_tree:
    file: queue_from_two_column_csv_and_remap_results_to_nested_tree.sh
    lines: 31
    scheduler: htcondor
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr
    notes: This is the tested file content with placeholders added for reuse.
  apptainer_wrapper_executable_with_bind_mount_workdir:
    file: apptainer_wrapper_executable_with_bind_mount_workdir.sh
    lines: 18
    scheduler: htcondor
    tool: apptainer
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr
    notes: run_wrapper.sh as-is with placeholders.
  singularity_bind_ro_inputs_rw_outputs_split_workdirs:
