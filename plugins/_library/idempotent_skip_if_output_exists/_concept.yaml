name: idempotent_skip_if_output_exists
description: Skip work if the expected final artifact already exists.
category: submission
interface:
  inputs:
  - OUTPUT_ROOT
  - REL_PATH
  outputs:
  - Exit code 0 if should skip; 1 if should proceed
invariants:
- Completion is defined solely by existence of OUTPUT_ROOT/<REL_PATH>_results.tar.gz.
variants:
  DFT-singlepoint-Anvil-Slurm_default:
    file: DFT-singlepoint-Anvil-Slurm_default.sh
    lines: 22
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr_orca_multiwfn_anvil
    notes: Use inside submission loops to make reruns safe.
