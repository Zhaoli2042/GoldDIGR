name: read_only_input_workaround_yarp
description: Work around YARP writing temp files next to inputs by copying XYZ to a temporary writable directory when inputs
  are read-only.
category: compute
interface:
  inputs:
  - xyz_path
  - charge
  outputs:
  - bem matrix or None
invariants:
- Probe write access by creating/removing a .write_test file in the input directory.
- If not writable, copy XYZ to tempfile.mkdtemp and run YARP there; always cleanup temp dir.
variants:
  DFT-COPT-TSOPT-CRC-SGE_default:
    file: DFT-COPT-TSOPT-CRC-SGE_default.sh
    lines: 109
    scheduler: any
    tool: yarp | openbabel
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: This is embedded in get_yarp_bem; keep behavior.
