name: distance_based_bond_inference
description: Infer adjacency matrix from 3D geometry using UFF-like radii and a scale factor.
category: science
interface:
  inputs:
  - Elements
  - Geometry
  - File
  outputs:
  - Adj_mat (NxN)
invariants:
- Uses element radii dictionary and a fixed scale_factor=1.2.
- Hermitize adjacency matrix after assigning upper triangle.
- Abort if an element is not in the radii table.
variants:
  Perovskite-ligand-screening_default:
    file: Perovskite-ligand-screening_default.sh
    lines: 53
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - MD/lib/adjacency.py
    notes: Includes built-in warnings and pruning in the same function (see next concept).
