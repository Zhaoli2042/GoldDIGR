name: replicate_runs_directory_fanout
description: Create run1..runN replicate directories, copy shared inputs, write LAMMPS input + submit scripts, and submit
  via sbatch.
category: scheduler
interface:
  inputs:
  - dir_prefix
  - start
  - end
  - config (nodes/ppn/queue/walltime/LAMMPS_PATH)
  outputs:
  - submitted Slurm jobs; run directories populated
invariants:
- Never overwrite an existing run directory; skip it.
- Each run gets its own eval.in.init and submit.sh.
variants:
  Perovskite-ligand-screening_default:
    file: Perovskite-ligand-screening_default.sh
    lines: 43
    scheduler: slurm
    tool: lammps
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - MD/step1.build_bulk_sims.py
    notes: Uses functions.cd and functions_writers.
