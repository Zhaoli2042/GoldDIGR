name: submission_audit_trail_pipe_log
description: Append a pipe-delimited submission record for later auditing/resubmission.
category: monitoring
interface:
  inputs:
  - SUBMIT_LOG
  - JOB_ID
  - REL_PATH
  - ZIP_PATH
  outputs:
  - Appended line in SUBMIT_LOG
invariants:
- 'Log format must be: ''timestamp | job_id | rel_path | zip_path'' (pipe-delimited).'
variants:
  DFT-singlepoint-Anvil-Slurm_default:
    file: DFT-singlepoint-Anvil-Slurm_default.sh
    lines: 18
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr_orca_multiwfn_anvil
    notes: audit.sh depends on this exact delimiter and field order.
