name: auto3d_subbatch_tmp_workdir_and_per_prefix_fanout
description: Run Auto3D once for a subbatch of SMILES in a unique temp workdir, then fan out per-PREFIX SDF and .smi provenance
  files.
category: science
interface:
  inputs:
  - subbatch
  - BATCH_DICT_SEPARATOR
  - auto3d_options
  - auto3d_main
  outputs:
  - status_map (smiles->bool)
  - per-prefix .sdf/.smi files in target_dir
  - optional Auto3D.log and encoded SDF
invariants:
- Batch dict value must be 'out_path:::prefix' using BATCH_DICT_SEPARATOR.
- Writes input file 'smi.smi' with lines 'SMILES PREFIX' so SDF titles match PREFIX.
- Uses first molecule's out_path as shared target_dir for all outputs in the subbatch.
- Fans out multi-record SDF by matching record title == PREFIX.
- Always writes {PREFIX}.smi even if SDF record missing.
variants:
  Auto3D-GPU-Slurm_default:
    file: Auto3D-GPU-Slurm_default.sh
    lines: 133
    scheduler: any
    tool: auto3d
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - purdue_standby_auto3d_auto_batch
    notes: This is the per-job execution wrapper logic (compute-node task wrapper).
