name: bem_sanity_checks
description: Validate BEM-derived bond change results and emit warnings/errors for suspicious cases.
category: monitoring
interface:
  inputs:
  - bem_r
  - bem_p
  - bond_changes
  - sigma_count
  outputs:
  - (is_valid_bool
  - issues_list)
invariants:
- If BEM missing => warning only; workflow may proceed.
- bond_changes == 'no_changes' => hard error.
- sigma_count == 0 => warning; constraints will be absent.
variants:
  DFT-COPT-TSOPT-CRC-SGE_default:
    file: DFT-COPT-TSOPT-CRC-SGE_default.sh
    lines: 42
    scheduler: any
    tool: any
    infrastructure:
      filesystem: any
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: MAX_BOND_CHANGES threshold is a constant.
