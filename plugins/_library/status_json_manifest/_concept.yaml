name: status_json_manifest
description: Write a machine-readable status.json summarizing per-molecule statuses and overall completion/partial.
category: monitoring
interface:
  inputs:
  - ZIP_FILENAME
  - COMPLETE_COUNT
  - TIMEOUT_COUNT
  - MOLECULES[]
  - MOL_STATUS[]
  outputs:
  - status.json
invariants:
- Per-molecule statuses are string values keyed by molecule name.
- Overall status is 'partial' if any TIMEOUT_COUNT>0; 'all_molecules_missing' if none processed and none complete.
- Per-molecule keys must match the fixed molecule name list used by round-2 tooling.
- Include zip_file, charge, multiplicity, wall_limit_seconds, elapsed_seconds, and per-molecule map.
- Includes zip_file, charge, multiplicity, wall_limit_seconds, elapsed_seconds.
- Reads SLURM_* environment variables; safe if unset (defaults to '').
- overall status is 'partial' if TIMEOUT_COUNT > 0 else 'complete'.
- Overall status is 'partial' if any molecule timed out; else 'complete' unless all missing.
variants:
  DFT-singlepoint-Anvil-Slurm_default:
    file: DFT-singlepoint-Anvil-Slurm_default.sh
    lines: 36
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr_orca_multiwfn_anvil
    notes: Requires bash arrays/assoc arrays in scope.
  status_json_with_round2_fields_and_per_molecule_statuses:
