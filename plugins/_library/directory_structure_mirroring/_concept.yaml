name: directory_structure_mirroring
description: Mirror an input directory tree into a target directory (create all subdirectories).
category: adapters
interface:
  inputs:
  - SOURCE_DIR
  - TARGET_DIR
  outputs:
  - Target directory tree created to match source
invariants:
- Ensures destination directory exists.
- Run from a stable SOURCE_DIR; the relative paths produced by find must be preserved.
- Run from workflow root where inputs/ and results/ are siblings.
- Mirror directories (not files) to preserve nested structure.
- Must be safe to call repeatedly; must not error if directory already exists.
- Use mkdir -p so reruns are idempotent.
- Uses shutil.copy2 to preserve metadata.
variants:
  DFT-singlepoint-Anvil-Slurm_default:
    file: DFT-singlepoint-Anvil-Slurm_default.sh
    lines: 17
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr_orca_multiwfn_anvil
    notes: Must run on a filesystem where both SOURCE_DIR and TARGET_DIR are accessible.
  mirror_inputs_tree_under_results_for_remapped_outputs:
