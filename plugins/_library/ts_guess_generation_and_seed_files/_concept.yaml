name: ts_guess_generation_and_seed_files
description: Preprocessing step that copies TS.xyz to ts_guess.xyz, copies R/P into output, and writes workflow_status.json.
category: adapters
interface:
  inputs:
  - r_xyz
  - p_xyz
  - ts_xyz
  - charge
  - mult
  - output_dir
  outputs:
  - (workflow_status_dict
  - ts_guess_path) and files in output_dir
invariants:
- ts_guess.xyz is a direct copy of provided TS geometry (no modification).
- Always write workflow_status.json into output_dir.
variants:
  DFT-COPT-TSOPT-CRC-SGE_default:
    file: DFT-COPT-TSOPT-CRC-SGE_default.sh
    lines: 94
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: "This is the core of xyz_prep.py\u2019s processing."
