name: zip_process_xtbscan_summary_record
description: 'Process one TS zip: require xTB-scan/reactive_summary.csv, optionally parse TS frame and spin crossover, emit
  JSON-ready dict.'
category: adapters
interface:
  inputs:
  - zip_path
  outputs:
  - dict_or_None
invariants:
- Do not emit a record unless reactive_summary.csv exists under xTB-scan/.
- Skip archives that do not contain any 'xTB-scan/' member.
- Assumes UTF-8 compatible JSON; exceptions propagate to caller unless caught.
- Read only needed members (selective extraction) to keep it scalable.
variants:
  xTB-wbo-scan-Slurm_default:
    file: xTB-wbo-scan-Slurm_default.sh
    lines: 62
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: Intended for JSONL aggregation.
  simple_json_file_to_dict_loader:
    file: simple_json_file_to_dict_loader.sh
    lines: 13
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - get_auto3d_calc_status
    notes: Used for benchmark JSON ingestion.
