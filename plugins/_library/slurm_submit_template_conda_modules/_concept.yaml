name: slurm_submit_template_conda_modules
description: SLURM batch script template that loads modules, activates conda env, and runs a per-parent analysis script.
category: scheduler
interface:
  inputs:
  - JOBNAME_PLACEHOLDER
  - FILEPATH
  outputs:
  - SLURM job execution logs
invariants:
- JOBNAME_PLACEHOLDER and FILEPATH placeholders must be replaced before submission.
- Requests 1 GPU, 10 CPUs per GPU, 100G RAM, 4h walltime, standby QoS.
- Assumes module system provides conda and required libs; analysis is invoked as ./run_analysis.sh FILEPATH.
- Assumes module system provides 'module load conda' and conda activation works in batch jobs.
- 'Calls this same python file with: ''run-batch {{BATCH_JSON}} --procs 1 --auto-batch-size {{N}}''.'
variants:
  xTB-wbo-scan-Slurm_default:
    file: xTB-wbo-scan-Slurm_default.sh
    lines: 34
    scheduler: slurm
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: '`run_analysis.sh` must exist alongside the submit script.'
  auto3d_gpu_run_batch_sbatch_template:
    file: auto3d_gpu_run_batch_sbatch_template.sh
    lines: 40
    scheduler: slurm
    tool: auto3d
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - purdue_standby_auto3d_auto_batch
    notes: queue/partition list is cluster-specific; keep as placeholders when porting.
