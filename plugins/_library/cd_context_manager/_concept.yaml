name: cd_context_manager
description: Context manager to temporarily change working directory and always restore it.
category: compute
interface:
  inputs:
  - newPath
  outputs:
  - cwd changed within context
invariants:
- Always restore the original working directory even if an exception occurs.
variants:
  Perovskite-ligand-screening_default:
    file: Perovskite-ligand-screening_default.sh
    lines: 22
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - MD/lib/functions.py
    notes: '`with cd(path): ...`'
