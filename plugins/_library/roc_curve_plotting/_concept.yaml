name: roc_curve_plotting
description: Plot ROC curve from predict_proba and save to file.
category: monitoring
interface:
  inputs:
  - fpr
  - tpr
  - auc
  - folder
  outputs:
  - '{{folder}}/ROC.png'
invariants:
- Uses auc(fpr,tpr) and plots diagonal baseline.
variants:
  Perovskite-ligand-screening_default:
    file: Perovskite-ligand-screening_default.sh
    lines: 42
    scheduler: any
    tool: matplotlib
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - ML/ML_single_model.py
    notes: Styling is tuned for publication-like output.
