name: workflow_bootstrap_start
description: One-button launcher that bootstraps directories, inventories inputs, chunks worklists, configures submit file,
  and starts tmux monitors.
category: scheduler
interface:
  inputs:
  - '{{CONTAINER_IMAGE_URI}}'
  - '{{JOBS_PER_CHUNK}}'
  - '{{MAX_JOBS}}'
  - '{{INPUT_TARBALL_GLOB}}'
  outputs:
  - inputs/
  - results/
  - logs/
  - submitted_batches/
  - file_list.txt
  - job_*.txt
  - configured batch_job.submit
  - tmux sessions
invariants:
- HTCondor submit file is configured by in-place token replacement before any submission.
- Chunk size fixed by JOBS_PER_CHUNK; preserve line order.
- Chunk numbering must not collide with existing job_*.txt in either root or submitted_batches/.
- Kill existing 'health' session if present, then start a new one in workflow directory.
- Start submit monitor in workflow directory so relative paths work.
- tmux sessions are named submit/health/backup and are killed/recreated on start.
- Input tarballs must contain .zip files under nested directories; extraction preserves structure.
- Must run from the workflow directory; uses relative paths and writes file_list.txt/job_*.txt.
- "RESOURCE_LEVELS block replacement must match the script\u2019s existing block boundaries."
- Only kill/restart 'submit' session; do not touch 'health' or 'backup'.
- Chunk files are named job_N.txt and pending chunks are removed/recreated on fresh start.
- Edits must be safe to re-run (detect already-updated values).
variants:
  DFT-singlepoint-OSG-Condor_default:
    file: DFT-singlepoint-OSG-Condor_default.sh
    lines: 235
    scheduler: htcondor
    tool: any
    infrastructure:
