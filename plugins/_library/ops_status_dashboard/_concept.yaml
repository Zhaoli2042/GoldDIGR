name: ops_status_dashboard
description: Lightweight operational dashboard summarizing queue, chunk progress, held reasons, results, backups, tmux sessions,
  and resource escalation.
category: monitoring
interface:
  inputs:
  - working directory with logs/results/submitted_batches; HTCondor CLI; tmux
  outputs:
  - human-readable stdout report
invariants:
- Only return jobs for the current $USER in pending/running states.
- Chunk progress is inferred from job_*.txt vs submitted_batches/job_*.txt.
- Held job summary uses HoldReason aggregation.
- Held job reasons are summarized by HoldReason frequency.
- Detect scheduler by presence of `squeue` or `qstat` in PATH.
- Must not fail if condor_q or tmux are unavailable; degrade gracefully.
- Job discovery prefers job_list.txt ordering when present; otherwise lists jobs/.
- Failure reasons pulled from status['dft_irc']['fail_reason'] when present.
- Uses condor_q if available; otherwise degrades gracefully.
- If Auto3D import fails, set _AUTO3D_AVAILABLE=False and skip computations rather than crashing.
- Treat missing status as pending/running rather than failed.
variants:
  DFT-singlepoint-OSG-Condor_default:
    file: DFT-singlepoint-OSG-Condor_default.sh
    lines: 116
    scheduler: htcondor
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - dft_energy_orca_multiwfn
    notes: Contains site-specific backup path logic; parameterize if reusing.
  cli_ops_dashboard_queue_chunks_holds_results_backups_tmux_escalation:
