name: charge_multiplicity_from_filename
description: Parse charge and multiplicity from a ZIP basename tokenized by underscores.
category: science
interface:
  inputs:
  - ZIP_PATH
  outputs:
  - CHARGE
  - MULT printed as 'CHARGE=<...> MULT=<...>' (or exportable vars)
invariants:
- 'Zip naming convention: ..._<charge>_<mult>.zip; charge is $(NF-1), mult is $NF.'
- 'Filename convention: ..._<charge>_<mult>.zip; charge may be negative.'
- 'Filename convention: <id>_<charge>_<multiplicity>.zip; charge is NF-1 and mult is NF.'
- Charge is second-to-last field; multiplicity is last field.
variants:
  DFT-singlepoint-Anvil-Slurm_default:
    file: DFT-singlepoint-Anvil-Slurm_default.sh
    lines: 21
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr_orca_multiwfn_anvil
    notes: Assumes no extra underscore tokens after multiplicity.
  parse_charge_mult_from_last_two_underscore_fields:
    file: parse_charge_mult_from_last_two_underscore_fields.sh
    lines: 16
    scheduler: any
    tool: any
    infrastructure:
      filesystem: isolated
    tested_by:
    - dft_energy_orca_multiwfn
    notes: Used by run_orca_wbo.sh.
  parse_charge_mult_from_last_two_underscore_fields_basename:
    file: parse_charge_mult_from_last_two_underscore_fields_basename.sh
    lines: 19
    scheduler: any
    tool: any
    infrastructure:
      filesystem: any
    tested_by:
    - golddigr
    notes: From run_orca_wbo.sh metadata parsing.
