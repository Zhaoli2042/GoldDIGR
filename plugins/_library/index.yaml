concepts:
  bem_csv_load_frame:
    description: Read one per-frame bond electron matrix CSV into labels + dense float matrix.
    n_variants: 1
  bem_csv_series_from_frames:
    description: Load all frame_*_bond_electrons.csv in a directory into a consistent label set and time-ordered matrices.
    n_variants: 1
  reactive_bem_summary_transposed:
    description: "Detect reactive atoms/bonds by |\u0394(BEM)| threshold and write a transposed time-series CSV (rows=frames,\
      \ cols=keys)."
    n_variants: 1
  bem_csv_write_per_frame:
    description: Write per-frame dense bond-electrons and bond-orders CSVs from WBO pairs and nominal valence.
    n_variants: 1
  xtb_wbo_parse_robust:
    description: Parse xTB .wbo output supporting both pair-list and matrix formats into (i<j)->wbo dict.
    n_variants: 1
  xyz_trajectory_read_multi:
    description: Parse concatenated XYZ blocks (multi-XYZ .trj-like) into per-frame records.
    n_variants: 3
  xyz_write_single_frame:
    description: Write a single XYZ file from symbols and coordinates.
    n_variants: 2
  charge_mult_electron_counting:
    description: Compute total electrons from element symbols and charge; derive base UHF parity heuristic.
    n_variants: 1
  xtb_spin_energy_tblite_driver:
    description: Run xTB SCC with tblite spin-polarization to get stable spin energies and HOMO-LUMO gap.
