  zip_member_find_by_suffix:
    description: Find a zip member by suffix, and find a member specifically under xTB-scan/ by basename.
    n_variants: 1
  ts_frame_from_finished_irc_trj:
    description: Identify TS frame as the max-energy frame from a multi-XYZ trajectory stored as bytes.
    n_variants: 1
  reactive_summary_slope_events:
    description: Compute finite-difference slope events per reactive bond column and record top-N |slope| frames.
