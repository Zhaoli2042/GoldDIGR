  directory_structure_mirroring:
    description: Mirror an input directory tree into a target directory (create all subdirectories).
    n_variants: 4
  zip_inventory_manifest:
    description: Generate a manifest mapping absolute ZIP paths to relative identifiers (without .zip).
    n_variants: 1
  idempotent_skip_if_output_exists:
    description: Skip work if the expected final artifact already exists.
    n_variants: 1
  batch_submission_and_jobid_capture_slurm:
    description: Submit a Slurm batch script and extract the numeric job ID from sbatch output.
    n_variants: 1
  submission_audit_trail_pipe_log:
    description: Append a pipe-delimited submission record for later auditing/resubmission.
