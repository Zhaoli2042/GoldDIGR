name: stage_status_normalization
description: Normalize per-stage status values from a workflow_status-like dict.
category: monitoring
interface:
  inputs:
  - status_dict
  - stage
  outputs:
  - status_string
invariants:
- Missing stage dict => not_run/not_started semantics rather than crashing.
variants:
  DFT-COPT-TSOPT-CRC-SGE_default:
    file: DFT-COPT-TSOPT-CRC-SGE_default.sh
    lines: 18
    scheduler: any
    tool: any
    infrastructure:
      filesystem: any
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: Keeps reporting stable across schema drift.
