name: finished_list_to_parent_dirs
description: Convert a finished.txt list of TS directories into a sorted unique list of parent directories.
category: adapters
interface:
  inputs:
  - finished_path
  outputs:
  - parent_dirs(list[str])
invariants:
- Strips whitespace and drops blank lines.
- 'Blank lines and comment lines starting with # are ignored.'
- Parents are returned as absolute paths and deduplicated.
- Only the first whitespace-separated token per line is treated as the TS path.
- Deduplication is set-based; output order is not preserved.
variants:
  xTB-wbo-scan-Slurm_default:
    file: xTB-wbo-scan-Slurm_default.sh
    lines: 28
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: Used by the zip summarizer.
  unique_nonempty_line_reader:
    file: unique_nonempty_line_reader.sh
    lines: 15
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - purdue_standby_auto3d_auto_batch
    notes: Used to deduplicate SMILES/PREFIX input lines before batching.
