name: sqlite_crud_helpers
description: SQLite connection + insert/retrieve/delete helpers for a fixed schema (bodies/headgroups/linkers/metals/halides/ligands/perovskites/fingerprints).
category: adapters
interface:
  inputs:
  - db_filename
  - connection
  - record dicts
  outputs:
  - connection
  - lastrowid
  - rows
  - booleans
invariants:
- SQL statements are schema-coupled; keep table/column names unchanged unless schema changes.
- Each add_* returns lastrowid; commit is optional via commit flag.
variants:
  Perovskite-ligand-screening_default:
    file: Perovskite-ligand-screening_default.sh
    lines: 55
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - MD/lib/functions_db.py
    notes: This is a library; import and call specific functions.
