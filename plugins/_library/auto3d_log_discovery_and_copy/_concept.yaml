name: auto3d_log_discovery_and_copy
description: Locate Auto3D.log near an SDF output (or in a known fallback path) and copy it into a results directory.
category: science
interface:
  inputs:
  - sdf_path
  - results_dir
  outputs:
  - results_dir/Auto3D.log if found
invariants:
- Fallback path 'smi_auto3d_geo_opt/Auto3D.log' is assumed relative to current working directory.
- Try job-root final_status.json before output/workflow_status.json to support partial runs and post-run promotion.
- Return None (not exception) when no status file exists so dashboards can treat as pending.
- 'Checks sibling of sdf_path first: dirname(sdf_path)/Auto3D.log.'
variants:
  Auto3D-GPU-Slurm_default:
    file: Auto3D-GPU-Slurm_default.sh
    lines: 19
    scheduler: any
    tool: auto3d
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - purdue_standby_auto3d_auto_batch
    notes: Keeps provenance for debugging and audit.
  status_json_fallback_search_ordered_paths:
    file: status_json_fallback_search_ordered_paths.sh
    lines: 22
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: Used by CLI dashboards and health monitors.
