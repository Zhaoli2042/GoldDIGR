name: round2_prepare_from_partial_results
description: Build round-2 resubmission zips by scanning results tarballs (and backup archives) for status.json=partial, carrying
  forward completed outputs, and writing skip.txt.
category: scheduler
interface:
  inputs:
  - results/ directory
  - optional backup archives directory
  - inputs/ directory containing original zips
  outputs:
  - round2_inputs/ tree of zips
  - file_list_round2.txt
invariants:
- Carry forward completed outputs so final results.tar.gz is self-contained after round-2.
- Carry forward completed outputs so final results are self-contained.
- Only retry timeout_skipped/timeout_killed molecules; do not retry orca_failed/missing.
- skip.txt lists completed molecule keys; run script must honor it.
- 'Partial detection is based on extracting status.json and reading \"status\": \"partial\".'
- Treat both direct *_results.tar.gz and nested ones inside backup_*.tar.gz.
- Round-2 zip must include skip.txt listing completed molecule names.
- Preserve original nested directory structure under round2_inputs/.
- Extract only status.json (wildcards) to avoid full untar cost when possible.
variants:
  DFT-singlepoint-OSG-Condor_default:
