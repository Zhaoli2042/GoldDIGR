name: workflow_override_by_bind_mount
description: Override a container-internal Python module by bind-mounting a host script onto the container path.
category: compute
interface:
  inputs:
  - OUTPUT_DIR
  - SCRIPTS_DIR
  - CONTAINER_IMAGE
  outputs:
  - container runs overridden /opt/dft_workflow/run_dft_verification.py
invariants:
- "Bind-mount target path must exactly match the container\u2019s import/entrypoint path."
- Mount override read-only to prevent container writes to host code.
variants:
  DFT-COPT-TSOPT-CRC-SGE_default:
    file: DFT-COPT-TSOPT-CRC-SGE_default.sh
    lines: 23
    scheduler: any
    tool: singularity
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: Used to add config support without rebuilding the SIF.
