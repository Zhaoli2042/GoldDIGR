name: orca_input_copt_with_constraints
description: ORCA constrained optimization (COPT) input template with optional bond constraints and mixed basis coordinate
  block.
category: science
interface:
  inputs:
  - xyz_path
  - output_path
  - charge
  - mult
  - basis_assignment
  - config
  - constraints
  - nprocs
  - maxcore
  - job_name
  outputs:
  - ORCA .inp file at output_path
invariants:
- Constraints are emitted as `%geom ... Constraints { B i j C } ... end`.
- Keyword line includes functional + aux_basis + grid + OPT FREQ and optional dispersion/extra_keywords.
- Uses %pal nprocs and %maxcore; sets %base to job_name.
variants:
  DFT-COPT-TSOPT-CRC-SGE_default:
    file: DFT-COPT-TSOPT-CRC-SGE_default.inp
    lines: 58
    scheduler: any
    tool: orca
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: Atom indices in constraints are passed through as provided (pipeline uses 0-based indices from bond_changes).
