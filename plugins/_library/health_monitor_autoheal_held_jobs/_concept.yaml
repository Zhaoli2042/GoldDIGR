name: health_monitor_autoheal_held_jobs
description: Periodic HTCondor health monitor that classifies held jobs and auto-heals via release and resource escalation
  with persistent tracking.
category: monitoring
interface:
  inputs:
  - '{{CHECK_INTERVAL_SECONDS}}'
  - '{{RESOURCE_LEVELS_ARRAY}}'
  - '{{DISK_UPGRADE_KB}}'
  outputs:
  - health_monitor.log
  - held_jobs_unknown.log
  - held_jobs_maxed.log
  - resource_tracking.dat; condor_qedit/condor_release actions
invariants:
- Use condor_qedit to change RequestMemory/RequestCpus/RequestDisk, then condor_release.
- Transfer-related holds are auto-released without resource changes.
- Track per-job resource level in a local file to make escalation monotonic across cycles.
- Never auto-release beyond MAX_LEVEL; log maxed jobs for manual intervention.
- Only edit IDLE jobs (JobStatus==1); leave running jobs untouched.
- Disk holds set RequestDisk to a fixed upgrade value, then release.
- Memory/CPU holds escalate to next predefined level using condor_qedit, then release.
- Classify holds by regex on HoldReason; only auto-release within defined max resource level.
- Use Owner constraint to avoid editing other users.
- Persist per-job escalation level in resource_tracking.dat to survive monitor restarts.
variants:
  DFT-singlepoint-OSG-Condor_default:
    file: DFT-singlepoint-OSG-Condor_default.sh
    lines: 326
    scheduler: htcondor
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - dft_energy_orca_multiwfn
    notes: HoldReason classification is string-based; keep patterns unchanged for tested behavior.
  constraint_qedit_reduce_requestmemory_for_idle_jobs:
    file: constraint_qedit_reduce_requestmemory_for_idle_jobs.sh
    lines: 25
    scheduler: htcondor
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr
    notes: From apply_memory_fix.sh step 4.
  holdreason_classifier_with_release_and_resource_ladder_and_disk_upgrade:
    file: holdreason_classifier_with_release_and_resource_ladder_and_disk_upgrade.sh
    lines: 8
    scheduler: htcondor
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr
    notes: monitor_health.sh as-is (resource ladder values are part of policy).
