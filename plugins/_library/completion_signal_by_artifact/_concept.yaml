name: completion_signal_by_artifact
description: Define completion by presence of a single expected tarball artifact.
category: monitoring
interface:
  inputs:
  - OUTPUT_ROOT
  - REL_PATH
  outputs:
  - Exit code 0 if complete; 1 if missing
invariants:
- 'Artifact name is derived as: ${REL_PATH}_results.tar.gz.'
variants:
  DFT-singlepoint-Anvil-Slurm_default:
    file: DFT-singlepoint-Anvil-Slurm_default.sh
    lines: 17
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr_orca_multiwfn_anvil
    notes: This is the contract shared by manager.sh and audit.sh.
