name: slurm_submission_template_with_modules
description: Generate an sbatch submission script for LAMMPS with module loads and standard stdout/stderr files.
category: scheduler
interface:
  inputs:
  - lammps_init
  - job_name
  - nodes
  - ppn
  - queue
  - walltime
  - lammps_exe
  - resub
  - repeat
  - output
  - log_name
  outputs:
  - submit.sh (or specified output)
invariants:
- 'Uses Slurm directives: --job-name, -N, -n, -t, -A, -o, -e.'
- Loads site modules (gcc/openmpi/etc.) exactly as written.
variants:
  Perovskite-ligand-screening_default:
    file: Perovskite-ligand-screening_default.sh
    lines: 44
    scheduler: slurm
    tool: lammps
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - MD/lib/functions_writers.py
    notes: The provided file is truncated in the bundle; keep as-is and fill remaining run command at integration time.
