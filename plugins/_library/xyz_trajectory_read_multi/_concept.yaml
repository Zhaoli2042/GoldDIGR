name: xyz_trajectory_read_multi
description: Parse concatenated XYZ blocks (multi-XYZ .trj-like) into per-frame records.
category: adapters
interface:
  inputs:
  - path
  outputs:
  - recs(list[tuple[symbols
  - coords
  - comment]])
invariants:
- First line must contain atom count; abort if mismatch with parsed coordinates.
- Frames with malformed coordinate lines are skipped by advancing one line and retrying.
- Frame parsing advances by 2+n_atoms lines; ignores malformed frames.
- Frame header is a line containing only an integer natoms.
- Last valid frame is used for restart geometry.
- Skip first two header lines; ignore empty lines.
- Second line is treated as comment and preserved.
variants:
  xTB-wbo-scan-Slurm_default:
    file: xTB-wbo-scan-Slurm_default.sh
    lines: 41
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - '{{PLUGIN_NAME}}'
    notes: Designed for finished_irc.trj-like files.
  single_xyz_with_header_validation_and_optional_types_column:
    file: single_xyz_with_header_validation_and_optional_types_column.sh
    lines: 103
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
