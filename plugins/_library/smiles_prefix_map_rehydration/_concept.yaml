name: smiles_prefix_map_rehydration
description: Load original SMILES list to map SMILES back to PREFIX for retry lists.
category: adapters
interface:
  inputs:
  - file_path
  outputs:
  - Dict[str
  - str] smiles_to_prefix
invariants:
- Input lines are split on whitespace; first token is SMILES.
- If prefix missing, uses 'NO_PREFIX'.
- If file missing, returns empty mapping.
variants:
  Auto3D-GPU-Slurm_default:
    file: Auto3D-GPU-Slurm_default.sh
    lines: 30
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - get_auto3d_calc_status
    notes: Enables writing failed/missing lists as 'SMILES PREFIX'.
