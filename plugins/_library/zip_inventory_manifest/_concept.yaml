name: zip_inventory_manifest
description: Generate a manifest mapping absolute ZIP paths to relative identifiers (without .zip).
category: adapters
interface:
  inputs:
  - SOURCE_DIR
  - MANIFEST_OUT
  outputs:
  - 'MANIFEST_OUT file (two columns: abs path'
  - relative path; both sans .zip)
invariants:
- 'Manifest line format must remain: ''<abs_zip_path>, <relative_path>'' (comma+space) before downstream parsing.'
- Strip '.zip' suffix from both fields using sed 's/\\.zip$//'.
variants:
  DFT-singlepoint-Anvil-Slurm_default:
    file: DFT-singlepoint-Anvil-Slurm_default.sh
    lines: 17
    scheduler: any
    tool: any
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - golddigr_orca_multiwfn_anvil
    notes: Downstream manager.sh trims a trailing comma from ZIP_PATH; keep the comma in column 1.
