name: confusion_matrix_visualization
description: Seaborn heatmap confusion matrix with counts, percentages, and derived precision/recall/F1 text.
category: monitoring
interface:
  inputs:
  - cf
  - group_names
  - categories
  - flags
  - figsize
  - cmap
  - title
  - folder
  outputs:
  - '{{folder}}/metrics.png'
invariants:
- Percentages are normalized by total sum(cf).
- For binary matrices, compute precision/recall/F1 from cf indices.
variants:
  Perovskite-ligand-screening_default:
    file: Perovskite-ligand-screening_default.sh
    lines: 77
    scheduler: any
    tool: matplotlib | seaborn
    infrastructure:
      filesystem: shared_fs
    tested_by:
    - ML/ML_single_model.py
    notes: Directly reusable for any binary classifier.
