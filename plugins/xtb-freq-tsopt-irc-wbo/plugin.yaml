name: "xtb-freq-tsopt-irc-spinwbo-yarp-sankey"
description: "xTB frequency screening -> xTB TS optimization -> IRC -> spin/WBO scan -> YARP BEM analysis -> Sankey electron-transport diagrams."
scheduler: "slurm"
stages:
  - name: "xtb_frequency"
    description: "GFN2-xTB Hessian/frequency calculation on each input XYZ to screen for TS candidates."
    type: "command"
    gate:
      type: "imaginary_freq"
      file: "xtb_freq.out"
      threshold: 20
  - name: "tsopt"
    description: "Pysisyphus RS-P-RFO transition state optimization using xTB; writes optimized TS geometry."
    type: "command"
    gate:
      type: "file_exists"
      file: "ts_final_geometry.xyz"
  - name: "irc"
    description: "Pysisyphus Euler predictor-corrector IRC from the optimized TS; writes trajectory and endpoint XYZs."
    type: "command"
    gate:
      type: "file_exists"
      file: "finished_irc.trj"
  - name: "spin_wbo_scan"
    description: "Two-pass spin-polarized xTB scan + Wiberg bond order extraction along IRC frames via scripts/spin_wbo_scan.py; produces xTB-scan/ with per-frame CSVs and summaries."
    type: "python"
    gate:
      type: "directory_exists"
      file: "xTB-scan"
  - name: "irc_analysis_yarp"
    description: "YARP bond-electron matrix (BEM) analysis of IRC endpoints and frames via scripts/yarp_results_builder.py; writes IRC_Analysis/ including per-frame JSON/CSVs and IRC_Analysis/finished_irc/ts_frame.txt."
    type: "python"
    gate:
      type: "directory_exists"
      file: "IRC_Analysis"
  - name: "sankey"
    description: "Generate electron transport Sankey diagrams from BEM time series via scripts/irc_sankey_zoomsvg_fixed.py; writes IRC_Analysis/sankey/ HTML and optional SVG exports."
    type: "python"
    gate:
      type: "directory_exists"
      file: "IRC_Analysis/sankey"
charge_strategy: >
  "If the XYZ comment line encodes charge info, use it. Otherwise, run independent samples at charges -1, 0, and 1 (three runs per XYZ). For each charge, set multiplicity to the lowest allowed (electron-parity-based; i.e., even electrons -> singlet, odd electrons -> doublet unless overridden)."
outputs:
  - "xtb_freq.out"
  - "ts_final_geometry.xyz"
  - "finished_irc.trj"
  - "finished_first.xyz"
  - "finished_last.xyz"
  - "xTB-scan/"
  - "xTB-scan/reactive_summary.csv"
  - "xTB-scan/spin_scan_summary.csv"
  - "xTB-scan/spin_crossover_frames.txt"
  - "IRC_Analysis/"
  - "IRC_Analysis/finished_irc/ts_frame.txt"
  - "IRC_Analysis/sankey/"
  - "SCO_WBO_summary.jsonl"